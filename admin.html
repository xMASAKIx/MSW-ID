<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW 商品管理員 - Console 偵錯版</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background: #0f0f12; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 40px; }
		.container { width: 100%; max-width: 1000px; }
		.config-card { background: #1a1a1d; padding: 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
		.input-group { display: flex; gap: 10px; margin-bottom: 10px; }
		input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #252529; color: #fff; outline: none; }
		button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #4e5d6e; color: white; transition: 0.2s; }
		button:hover { background: #5a6b7d; }
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
		.item-card { background: #1a1a1d; border-radius: 12px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
		.img-container { background: #0a0a0c; height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
		.img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
		.info-container { padding: 15px; flex-grow: 1; }
		.price-badge { background: #43b581; color: white; padding: 4px 10px; border-radius: 6px; font-size: 18px; font-weight: bold; margin-bottom: 12px; display: inline-block; }
		.info-row { display: flex; align-items: flex-start; margin-bottom: 8px; font-size: 13px; color: #b0b0b0; }
		.info-row span.label { min-width: 70px; color: #888; }
		.info-row b { color: #fff; margin-left: 5px; word-break: break-all; }
		.btn-sync { background: #5865f2; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; transition: 0.2s; }
		.btn-sync:hover { background: #4752c4; }
		#status { margin-top: 10px; font-size: 12px; color: #888; }
	</style>
</head>
<body>

<div class="container">
	<div class="config-card">
		<h2 style="margin-top:0; font-size:18px;">📦 MSW 商品管理 (含 Console 偵錯)</h2>
		<div class="input-group">
			<input type="text" id="target_ppsn" placeholder="請輸入目標作者 PPSN">
			<button onclick="fetchItems()">抓取清單</button>
		</div>
		<div id="status">準備就緒 (執行後請按 F12 查看主控台)</div>
	</div>
	<div id="item_grid"></div>
</div>

<script>
	const GITHUB_CONFIG = {
		token: "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",
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	const ALLOWED_TYPES = {
		"HAIR": "髮型", "HAT": "帽子", "TOP": "上衣", "OVERALL": "大衣",
		"BOTTOM": "褲裙", "SHOES": "鞋子", "GLOVE": "手套", "CAPE": "披風"
	};

	async function fetchItems() {
		const ppsn = document.getElementById('target_ppsn').value.trim();
		const status = document.getElementById('status');
		const grid = document.getElementById('item_grid');
		const token = localStorage.getItem('msw_token');
		const uid = localStorage.getItem('msw_uid');

		if (!ppsn) return alert("請輸入 PPSN");
		if (!token || !uid) return alert("請確認 localStorage 中的 token 與 uid 已設定");

		status.innerHTML = "⏳ 正在請求 API 並列印資料到 Console...";
		grid.innerHTML = "";

		try {
			const api = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
			const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(api)}`, {
				headers: { "mod-accesstoken": token, "mod-user-id": uid }
			});
			
			const json = await res.json();
			
			// --- 這裡會將完整的 API 回傳資料印在瀏覽器的 F12 Console ---
			console.log("🔍 [Debug] MSW API 原始回傳:", json);
			
			const items = json.data?.items || [];

			const filteredItems = items.filter(item => ALLOWED_TYPES.hasOwnProperty(item.avatarType));

			if (filteredItems.length === 0) {
				status.innerHTML = "⚠️ 找不到符合部位的商品，請檢查 Console 資料結構。";
				return;
			}

			filteredItems.forEach(item => {
				// 嘗試從不同欄位抓取價格
				const realPrice = item.price || item.salePrice || item.discountPrice || 0;
				
				const card = document.createElement('div');
				card.className = 'item-card';
				card.innerHTML = `
					<div class="img-container"><img src="${item.itemThumbnailUrl}"></div>
					<div class="info-container">
						<div class="price-badge">${realPrice} WC</div>
						<div class="info-row"><span class="label">名稱</span> <b>${item.itemName}</b></div>
						<div class="info-row"><span class="label">ID</span> <b>${item.itemId}</b></div>
						<div class="info-row"><span class="label">類型</span> <b>${ALLOWED_TYPES[item.avatarType]}</b></div>
					</div>
					<button class="btn-sync" onclick="syncToGithub('${item.itemId}', '${item.itemName}', '${item.itemThumbnailUrl}', '${realPrice}')">🚀 同步真實價格</button>
				`;
				grid.appendChild(card);
			});

			status.innerHTML = `✅ 已載入 ${filteredItems.length} 件商品。請檢查 Console 確認價格欄位是否正確。`;
		} catch (err) {
			console.error("❌ 發生錯誤:", err);
			status.innerHTML = "❌ 抓取失敗，請查看 Console 報錯資訊。";
		}
	}

	async function syncToGithub(id, name, img, price) {
		const payload = {
			keyword: name.replace(/\n|\r/g, "").trim(),
			wc: price + "wc",
			id: id,
			img: img,
			ts: Date.now()
		};

		try {
			const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
			const getRes = await fetch(url, { headers: { "Authorization": `token ${GITHUB_CONFIG.token}` } });
			let sha = "", list = [];

			if (getRes.ok) {
				const file = await getRes.json();
				sha = file.sha;
				list = JSON.parse(decodeURIComponent(escape(atob(file.content))));
			}

			const idx = list.findIndex(i => i.id === payload.id);
			if (idx > -1) list[idx] = payload; else list.push(payload);

			// 使用 Tab 鍵縮排
			const jsonStr = JSON.stringify(list, null, "\t");
			const content = btoa(unescape(encodeURIComponent(jsonStr)));

			const putRes = await fetch(url, {
				method: "PUT",
				headers: { "Authorization": `token ${GITHUB_CONFIG.token}`, "Content-Type": "application/json" },
				body: JSON.stringify({ 
					message: `📦 Sync: ${payload.keyword} (${price}WC)`, 
					content: content, 
					sha: sha 
				})
			});

			if (putRes.ok) alert(`🎉 同步成功！`);
		} catch (err) {
			alert("同步錯誤，請查看 Console。");
			console.error(err);
		}
	}
</script>
</body>
</html>
