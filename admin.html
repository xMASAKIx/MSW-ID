<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MSW 後台 (穩定增強版)</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h2 { text-align: center; color: #1a1d23; margin-bottom: 25px; }
        .hint { background: #eef2ff; border-left: 4px solid #5865F2; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #444; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        input { width: 100%; margin: 8px 0 18px 0; padding: 12px; border: 1px solid #dcdfe6; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #5865F2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #99aab5; }
        #status { text-align: center; margin-top: 20px; font-size: 14px; min-height: 40px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📦 MSW 快速上架</h2>
        <div class="hint">複製資料後切換回本頁，系統將自動填入。</div>

        <label>GitHub Token</label>
        <input type="password" id="token" placeholder="貼上 Token">
        
        <label>商品名稱 (keyword)</label>
        <input type="text" id="keyword" placeholder="自動填入或手動輸入">
        
        <label>價格 (wc)</label>
        <input type="text" id="wc" placeholder="自動填入">
        
        <label>商品 ID (id)</label>
        <input type="text" id="id" placeholder="自動填入">
        
        <label>圖片網址 (img)</label>
        <input type="text" id="img" placeholder="自動填入">
        
        <button id="btn" onclick="updateGitHub()">🚀 立即上架</button>
        <div id="status"></div>
    </div>

    <script>
        window.onload = function() {
            const savedToken = localStorage.getItem('msw_github_token');
            if (savedToken) document.getElementById('token').value = savedToken;
            
            // 監測視窗聚焦自動填入
            window.addEventListener('focus', autoPaste);
        };

        async function autoPaste() {
            try {
                const text = await navigator.clipboard.readText();
                const idMatch = text.match(/[A-Z0-9]{8,11}/);
                const priceMatch = text.match(/(\d+)\s*WC/i);
                const imgMatch = text.match(/https:\/\/mod-file\.dn\.nexoncdn\.co\.kr\/[^\s]+/);
                
                if (idMatch || imgMatch) {
                    if (idMatch) document.getElementById('id').value = idMatch[0];
                    if (priceMatch) document.getElementById('wc').value = priceMatch[1] + "wc";
                    if (imgMatch) document.getElementById('img').value = imgMatch[0];
                    
                    let name = text.split("\n")[0].trim();
                    if (text.includes("商品名稱")) name = text.split("商品名稱")[1].split("\n")[0].replace(/[:\s]+/g, '');
                    document.getElementById('keyword').value = name;
                    
                    document.getElementById('status').innerText = "✨ 資料已自動更新";
                    document.getElementById('status').style.color = "#5865F2";
                }
            } catch (e) { console.log("Clipboard access denied"); }
        }

        const UTF8 = {
            encode(s) { return btoa(unescape(encodeURIComponent(s))); },
            decode(s) { return decodeURIComponent(escape(atob(s))); }
        };

        async function updateGitHub() {
            const token = document.getElementById('token').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            const newItem = {
                keyword: document.getElementById('keyword').value,
                wc: document.getElementById('wc').value,
                id: document.getElementById('id').value,
                img: document.getElementById('img').value
            };

            if (!token || !newItem.id) return alert("請檢查 Token 與 ID 是否填寫");

            localStorage.setItem('msw_github_token', token);
            btn.disabled = true;
            status.innerText = "⏳ 正在連線至 GitHub...";
            status.style.color = "blue";

            try {
                const owner = "xmasakix"; 
                const repo = "MSW-ID";
                const path = "data.json";

                // 1. 抓取檔案 (增加防快取參數)
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?t=${Date.now()}`, {
                    headers: { 
                        "Authorization": `Bearer ${token}`, // 使用 Bearer 格式更穩定
                        "Accept": "application/vnd.github.v3+json"
                    }
                });

                if (!res.ok) {
                    const errorDetail = await res.json();
                    throw new Error(`GitHub 錯誤: ${errorDetail.message || res.status}`);
                }

                const fileData = await res.json();
                const content = JSON.parse(UTF8.decode(fileData.content));
                content.push(newItem);

                // 2. 更新檔案
                const updateRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: "PUT",
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        message: `Add: ${newItem.keyword}`,
                        content: UTF8.encode(JSON.stringify(content, null, 2)),
                        sha: fileData.sha
                    })
                });

                if (updateRes.ok) {
                    status.innerText = "✅ 上架完成！";
                    status.style.color = "green";
                    ["keyword", "wc", "id", "img"].forEach(id => document.getElementById(id).value = "");
                } else {
                    const errJson = await updateRes.json();
                    throw new Error(errJson.message);
                }
            } catch (e) {
                status.innerText = "❌ 失敗: " + e.message;
                status.style.color = "red";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
