<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - Multi-ID Version</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 頂部搜尋區 */
		.search-section { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; }
		.input-group { display: flex; gap: 10px; margin-bottom: 10px; }
		input { background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 10px; border-radius: 6px; flex: 1; outline: none; }
		input:focus { border-color: #5865f2; }
		button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

		/* 用戶資訊區塊 */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 25px; margin-bottom: 25px; display: none; }
		.profile-layout { display: flex; align-items: center; gap: 30px; }
		.full-body-wrapper { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px solid #333; }
		.full-body-img { height: 220px; image-rendering: pixelated; }
		.nickname-row { font-size: 28px; font-weight: bold; display: flex; align-items: center; gap: 12px; }
		.avatar-circle { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #5865f2; overflow: hidden; margin-top: 15px; }
		.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

		/* 商品網格 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; transition: transform 0.2s; }
		.item-card:hover { transform: translateY(-5px); border-color: #5865f2; }
		.img-box { background: #000; height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
		.img-box img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
		.wc-badge { position: absolute; left: 12px; bottom: 12px; background: #43b581; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
		.info-box { padding: 15px; }
		.sync-btn { width: 100%; background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; border-top: 1px solid #2d2d30; font-weight: bold; }

		#status { margin-bottom: 15px; font-size: 14px; color: #adadb8; text-align: center; }
		.err-msg { color: #f04747; font-weight: bold; }
	</style>
</head>
<body>

<div class="container">
	<div class="search-section">
		<div class="input-group">
			<input type="text" id="id_input" placeholder="輸入 PPSN 或 5 碼 ID" value="20372100007618840">
			<input type="text" id="token_input" placeholder="mod-accesstoken">
			<button onclick="smartFetch()">執行查詢</button>
		</div>
		<div id="status">準備就緒</div>
	</div>

	<div id="user_profile">
		<div class="profile-layout">
			<div class="full-body-wrapper">
				<img id="ui_full_body" class="full-body-img" src="">
			</div>
			<div class="user-details">
				<div class="nickname-row">
					<span id="ui_nickname">...</span>
				</div>
				<div id="ui_ppsn_display" style="color: #666; margin-top: 5px; font-family: monospace;"></div>
				<div class="avatar-circle">
					<img id="ui_avatar" src="">
				</div>
			</div>
		</div>
	</div>

	<div id="item_grid"></div>
</div>

<script>
	// 初始化 Token
	document.getElementById('token_input').value = localStorage.getItem('msw_token') || "";

	async function smartFetch() {
		const rawInput = document.getElementById('id_input').value.trim();
		const token = document.getElementById('token_input').value.trim();
		const status = document.getElementById('status');

		if (!rawInput || !token) return alert("請輸入 ID 並確保 Token 已填寫");
		localStorage.setItem('msw_token', token);

		// 重置介面
		document.getElementById('user_profile').style.display = 'none';
		document.getElementById('item_grid').innerHTML = "";
		status.innerHTML = "⏳ 正在處理中...";

		let ppsn = "";

		try {
			// 判斷輸入的是 PPSN 還是 5 碼 ID
			if (rawInput.length > 10) {
				ppsn = rawInput;
			} else {
				status.innerHTML = "🔍 正在轉換 5 碼 ID 為 PPSN...";
				const basicUrl = `https://msw-avatar-extractor.vercel.app/api/profile/basic?code=${rawInput}`;
				const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(basicUrl)}`);
				const data = await res.json();
				if (!data.ppsn) throw new Error("該 ID 尚未被第三方資料庫收錄");
				ppsn = data.ppsn;
			}

			// 抓取用戶 Profile
			status.innerHTML = "👤 正在獲取用戶資訊...";
			await fetchUserProfile(ppsn, token);

			// 抓取商品清單
			status.innerHTML = "📦 正在獲取商品清單...";
			await fetchItems(ppsn, token);

			status.innerHTML = "✅ 載入完成";
		} catch (err) {
			status.innerHTML = `<span class="err-msg">❌ 錯誤: ${err.message}</span>`;
		}
	}

	async function fetchUserProfile(ppsn, token) {
		const url = `https://mverse-api.nexon.com/social/v1/profile/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		
		if (json.data) {
			const d = json.data;
			document.getElementById('user_profile').style.display = 'block';
			document.getElementById('ui_nickname').innerText = d.nickname || "未知用戶";
			document.getElementById('ui_ppsn_display').innerText = `PPSN: ${ppsn}`;
			document.getElementById('ui_avatar').src = d.profileImageUrl || "";
			document.getElementById('ui_full_body').src = d.avatarImageUrl || "";
		}
	}

	async function fetchItems(ppsn, token) {
		const url = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		const items = json.data?.items || [];
		
		const grid = document.getElementById('item_grid');
		const targetTypes = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
		
		items.filter(i => targetTypes.includes(i.avatarType)).forEach(item => {
			const price = item.price || item.salePrice || 0;
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-box">
					<img src="${item.itemThumbnailUrl}">
					<div class="wc-badge">${price} WC</div>
				</div>
				<div class="info-box">
					<div style="font-weight:bold; font-size:14px; margin-bottom:4px;">${item.itemName}</div>
					<div style="color:#777; font-size:11px; font-family:monospace;">ID: ${item.itemId}</div>
				</div>
				<button class="sync-btn" onclick="alert('同步: ${item.itemName}')">🚀 同步到 GitHub</button>
			`;
			grid.appendChild(card);
		});
	}
</script>

</body>
</html>
