<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Panel (Fixed)</title>
	<style>
		body { font-family: sans-serif; background: #0f0f12; color: #e0e0e0; display: flex; justify-content: center; padding: 40px; }
		.card { background: #1a1a1d; padding: 30px; border-radius: 16px; width: 450px; border: 1px solid #333; }
		h2 { margin-top: 0; color: #fff; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
		label { display: block; margin-top: 15px; font-size: 11px; color: #888; font-weight: 600; }
		input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #333; border-radius: 8px; background: #252529; color: #fff; box-sizing: border-box; }
		button { width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
		.btn-fetch { background: #4e5d6e; color: white; }
		.btn-sync { background: #5865F2; color: white; font-size: 16px; }
		#status { margin-top: 15px; text-align: center; font-size: 12px; min-height: 20px; }
		#json_preview { background: #000; color: #9cdcfe; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 20px; display: none; white-space: pre; border: 1px solid #444; }
	</style>
</head>
<body>

<div class="card">
	<h2>📦 MSW 商品上架助手</h2>
	
	<label>MSW Access Token</label>
	<input type="password" id="msw_token">
	
	<label>MSW User ID</label>
	<input type="text" id="msw_uid">

	<hr style="border: 0; border-top: 1px solid #333; margin: 25px 0;">

	<label>商品 ID</label>
	<div style="display: flex; gap: 10px;">
		<input type="text" id="target_id" placeholder="例如: KW8L9VSIN">
		<button class="btn-fetch" onclick="fetchNexonData()" style="margin-top:0; width: 100px;">抓取</button>
	</div>

	<div id="json_preview"></div>

	<label>商品名稱 (Keyword)</label>
	<input type="text" id="res_name">
	
	<label>價格 (WC)</label>
	<input type="text" id="res_price">

	<label>圖片連結 (Img)</label>
	<input type="text" id="res_img">

	<button class="btn-sync" onclick="syncToGithub()">🚀 同步至 GitHub</button>
	<div id="status"></div>
</div>

<script>
	const GITHUB_CONFIG = {
		token: "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",
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	window.onload = () => {
		document.getElementById('msw_token').value = localStorage.getItem('msw_token') || '';
		document.getElementById('msw_uid').value = localStorage.getItem('msw_uid') || '';
	};

	async function fetchNexonData() {
		const token = document.getElementById('msw_token').value.trim();
		const uid = document.getElementById('msw_uid').value.trim();
		const cleanId = document.getElementById('target_id').value.trim().replace(/[\/\\]/g, '');
		
		const status = document.getElementById('status');
		const preview = document.getElementById('json_preview');

		if (!cleanId || !token) return alert("請輸入 Token 與 ID");

		localStorage.setItem('msw_token', token);
		localStorage.setItem('msw_uid', uid);

		status.innerHTML = "⏳ 嘗試連線 (避免編碼路徑)...";
		preview.style.display = "none";

		// 關鍵修正：不要對整個網址進行 encodeURIComponent，只針對 Proxy 結構
		// 這能解決 image_a24449.png 中出現的 %2F 路徑錯誤
		const apiPath = `https://mod-gateway-prd-tokyo-2.nexon.com/mod/v1/avatar/shop/v2/items/${cleanId}`;
		const proxyUrl = `https://corsproxy.io/?${apiPath}`; 

		try {
			const res = await fetch(proxyUrl, {
				headers: {
					"mod-accesstoken": token,
					"mod-user-id": uid
				}
			});

			if (!res.ok) throw new Error(`HTTP ${res.status}`);

			const json = await res.json();
			const data = json.data || json;

			const item = {
				"keyword": (data.itemName || data.name || "未命名").replace(/\n|\r/g, "").trim(),
				"wc": (data.itemPrice || data.slotPrice || 0) + "wc",
				"id": cleanId,
				"img": data.itemImageUrl || data.itemThumbnailUrl || data.thumbnail || ""
			};

			document.getElementById('res_name').value = item.keyword;
			document.getElementById('res_price').value = item.wc;
			document.getElementById('res_img').value = item.img;

			preview.innerText = JSON.stringify(item, null, "\t");
			preview.style.display = "block";
			status.innerHTML = "✅ 資料抓取成功！";

		} catch (err) {
			status.innerHTML = `<span style="color:#ff4d4d">❌ 錯誤: ${err.message} (請檢查 ID 是否存在)</span>`;
		}
	}

	async function syncToGithub() {
		const status = document.getElementById('status');
		const payload = {
			keyword: document.getElementById('res_name').value,
			wc: document.getElementById('res_price').value,
			id: document.getElementById('target_id').value.trim(),
			img: document.getElementById('res_img').value
		};

		status.innerHTML = "🚀 同步至 GitHub...";

		try {
			const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
			const getRes = await fetch(url, { headers: { "Authorization": `token ${GITHUB_CONFIG.token}` } });

			let sha = "";
			let list = [];

			if (getRes.ok) {
				const file = await getRes.json();
				sha = file.sha;
				list = JSON.parse(decodeURIComponent(escape(atob(file.content))));
			}

			const idx = list.findIndex(i => i.id === payload.id);
			if (idx > -1) list[idx] = payload; else list.push(payload);

			const content = btoa(unescape(encodeURIComponent(JSON.stringify(list, null, "\t"))));
			
			const putRes = await fetch(url, {
				method: "PUT",
				headers: { "Authorization": `token ${GITHUB_CONFIG.token}`, "Content-Type": "application/json" },
				body: JSON.stringify({ message: `📦 Update: ${payload.keyword}`, content: content, sha: sha })
			});

			if (putRes.ok) status.innerHTML = "🎉 同步成功！";
			else throw new Error("GitHub 寫入失敗");
		} catch (err) {
			status.innerHTML = `<span style="color:#ff4d4d">❌ 同步失敗: ${err.message}</span>`;
		}
	}
</script>
</body>
</html>
