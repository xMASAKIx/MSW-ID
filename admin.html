<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - New API Version</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 設定面板 */
		.config-panel { background: #1a1a1d; border: 1px solid #3f3f44; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; display: flex; gap: 10px; align-items: center; }
		.config-panel input { background: #000; border: 1px solid #444; color: #adadb8; padding: 8px; border-radius: 4px; flex: 1; }
		.config-panel button { background: #3a3a3d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

		/* 搜尋列 */
		.search-container { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; display: flex; gap: 15px; }
		#ppsn_input { flex: 1; background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 16px; outline: none; }
		#fetch_btn { background: #5865f2; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

		/* 用戶資訊區塊 */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 30px; margin-bottom: 25px; display: none; }
		.profile-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }
		.full-body-img { height: 220px; object-fit: contain; image-rendering: pixelated; }
		.profile-footer { display: flex; align-items: center; gap: 15px; border-top: 1px solid #2d2d30; padding-top: 20px; width: 100%; }
		.avatar-circle { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #3f3f44; overflow: hidden; background: #000; }
		.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
		.nickname { font-size: 22px; font-weight: bold; color: #fff; }
		.tag { color: #adadb8; font-size: 18px; margin-left: 8px; }
		.ppsn-display { color: #666; font-size: 14px; font-family: monospace; }

		/* 商品網格 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; display: flex; flex-direction: column; }
		.img-wrapper { background: #000; height: 250px; display: flex; align-items: center; justify-content: center; position: relative; }
		.img-wrapper img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
		.price-badge { position: absolute; left: 15px; bottom: 15px; background: #43b581; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
		.item-info { padding: 15px; flex-grow: 1; }
		.github-btn { background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; border-top: 1px solid #2d2d30; }

		#status_text { margin-bottom: 15px; color: #adadb8; }
	</style>
</head>
<body>

<div class="container">
	<div class="config-panel">
		<strong>TOKEN:</strong>
		<input type="text" id="cfg_token" placeholder="貼上你的 mod-accesstoken">
		<button onclick="saveToken()">儲存</button>
	</div>

	<div class="search-container">
		<input type="text" id="ppsn_input" placeholder="輸入 PPSN" value="20372100007618840">
		<button id="fetch_btn" onclick="startFetching()">抓取資料</button>
	</div>

	<div id="status_text">請確保上方 Token 已正確設定</div>

	<div id="user_profile">
		<div class="profile-header">
			<img id="ui_full_body" class="full-body-img" src="">
		</div>
		<div class="profile-footer">
			<div class="avatar-circle">
				<img id="ui_avatar" src="">
			</div>
			<div class="text-info">
				<div><span id="ui_nickname" class="nickname">載入中...</span><span id="ui_tag" class="tag"></span></div>
				<div id="ui_ppsn" class="ppsn-display"></div>
			</div>
		</div>
	</div>

	<div id="item_grid"></div>
</div>

<script>
	const GIT_CONFIG = {
		token: "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",
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	document.getElementById('cfg_token').value = localStorage.getItem('msw_token') || "";

	function saveToken() {
		localStorage.setItem('msw_token', document.getElementById('cfg_token').value.trim());
		alert("Token 已儲存！");
	}

	async function startFetching() {
		const ppsn = document.getElementById('ppsn_input').value.trim();
		const mswToken = localStorage.getItem('msw_token');
		const status = document.getElementById('status_text');

		if (!ppsn || !mswToken) return alert("請輸入 PPSN 並儲存 Token");

		status.innerText = "⏳ 正在從新 API 抓取資料...";
		document.getElementById('user_profile').style.display = 'block';
		document.getElementById('item_grid').innerHTML = "";

		try {
			await Promise.all([
				fetchNewProfile(ppsn, mswToken),
				fetchItems(ppsn, mswToken)
			]);
			status.innerText = "✅ 載入完成";
		} catch (err) {
			status.innerText = "❌ 請求失敗，請檢查 Token 或網路";
			console.error(err);
		}
	}

	// 使用你提供的 social/v1/profile 接口
	async function fetchNewProfile(ppsn, token) {
		const url = `https://mverse-api.nexon.com/social/v1/profile/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		
		if (json.data) {
			const d = json.data;
			document.getElementById('ui_nickname').innerText = d.nickname || "未知";
			document.getElementById('ui_tag').innerText = d.profileTag ? "#" + d.profileTag : "";
			document.getElementById('ui_ppsn').innerText = "PPSN: " + ppsn;
			document.getElementById('ui_avatar').src = d.profileImageUrl || "";
			document.getElementById('ui_full_body').src = d.avatarImageUrl || "";
		}
	}

	async function fetchItems(ppsn, token) {
		const url = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		const items = json.data?.items || [];
		
		const grid = document.getElementById('item_grid');
		const targetTypes = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
		
		items.filter(i => targetTypes.includes(i.avatarType)).forEach(item => {
			const price = item.price || item.salePrice || 0;
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-wrapper">
					<img src="${item.itemThumbnailUrl}">
					<div class="price-badge">${price} WC</div>
				</div>
				<div class="item-info">
					<div style="font-weight:bold;">${item.itemName}</div>
					<div style="color:#777; font-size:12px; font-family:monospace;">ID: ${item.itemId}</div>
				</div>
				<button class="github-btn" onclick="sync('${item.itemId}','${item.itemName}','${item.itemThumbnailUrl}','${price}')">🚀 同步到 GitHub</button>
			`;
			grid.appendChild(card);
		});
	}

	async function sync(id, name, img, price) {
		// GitHub 同步逻辑...
		console.log("Syncing:", name);
		alert("準備同步: " + name);
	}
</script>
</body>
</html>
