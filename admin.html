<script>
        async function updateGitHub() {
            const token = document.getElementById('token').value;
            const newItem = {
                keyword: document.getElementById('keyword').value,
                wc: document.getElementById('wc').value,
                id: document.getElementById('id').value,
                img: document.getElementById('img').value
            };
            const status = document.getElementById('status');

            if(!token || !newItem.id) { alert("請填寫 Token 和商品 ID"); return; }
            status.innerText = "⏳ 正在處理中...";

            const owner = "xmasakix"; 
            const repo = "MSW-ID";    
            const path = "data.json";  

            try {
                // 1. 取得舊檔案內容與 SHA
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                const fileData = await res.json();
                
                // 修正點：使用解碼支援 UTF-8 的方式讀取舊內容
                const oldContentRaw = decodeURIComponent(escape(atob(fileData.content)));
                const oldContent = JSON.parse(oldContentRaw);

                // 2. 加入新內容
                oldContent.push(newItem);
                
                // 修正點：使用支援 UTF-8 的 Base64 編碼方式
                const newBody = btoa(unescape(encodeURIComponent(JSON.stringify(oldContent, null, 2))));

                // 3. 寫回 GitHub
                const updateRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Update data.json: Added ${newItem.keyword}`,
                        content: newBody,
                        sha: fileData.sha
                    })
                });

                if(updateRes.ok) {
                    status.style.color = "green";
                    status.innerText = "✅ 上架成功！亂碼問題已修復。";
                } else {
                    throw new Error("更新失敗，請檢查 Token 權限");
                }
            } catch (err) {
                status.style.color = "red";
                status.innerText = "❌ 錯誤：" + err.message;
            }
        }
    </script>
