<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW 管理員 - 用戶資訊整合版</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background: #0f0f12; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
		.container { width: 100%; max-width: 1000px; }
		
		/* 頂部搜尋欄 */
		.config-card { background: #1a1a1d; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
		.input-group { display: flex; gap: 10px; }
		input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #252529; color: #fff; outline: none; }
		button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #5865f2; color: white; }

		/* 用戶資訊卡 (仿照你的圖片) */
		#user_profile { 
			background: #161619; border-radius: 12px; border: 1px solid #333; 
			padding: 30px; margin-bottom: 20px; display: none; /* 預設隱藏 */
			position: relative; overflow: hidden;
		}
		.user-main { display: flex; flex-direction: column; align-items: center; text-align: center; }
		.full-body-img { height: 200px; margin-bottom: 20px; z-index: 2; }
		.user-footer { display: flex; align-items: center; width: 100%; gap: 15px; margin-top: 10px; border-top: 1px solid #2a2a2e; padding-top: 15px; }
		.avatar-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #444; background: #000; overflow: hidden; }
		.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
		.user-details { text-align: left; }
		.user-name { font-size: 22px; font-weight: bold; color: #fff; }
		.user-tag { color: #888; font-size: 18px; margin-left: 5px; }
		.user-ppsn { color: #666; font-size: 14px; margin-top: 4px; font-family: monospace; }

		/* 商品清單網格 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
		.item-card { background: #1a1a1d; border-radius: 10px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
		.img-container { background: #0a0a0c; height: 140px; display: flex; align-items: center; justify-content: center; }
		.info-container { padding: 12px; }
		.price-badge { background: #43b581; color: white; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
		.btn-sync { background: #4e5d6e; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
	</style>
</head>
<body>

<div class="container">
	<!-- 搜尋區 -->
	<div class="config-card">
		<div class="input-group">
			<input type="text" id="target_ppsn" placeholder="請輸入 PPSN (例如: 20372100004991307)">
			<button onclick="fetchAllData()">抓取資料</button>
		</div>
	</div>

	<!-- 用戶資訊卡 -->
	<div id="user_profile">
		<div class="user-main">
			<img id="view_full_body" class="full-body-img" src="">
		</div>
		<div class="user-footer">
			<div class="avatar-circle">
				<img id="view_avatar" src="">
			</div>
			<div class="user-details">
				<div><span id="view_nickname" class="user-name"></span><span id="view_tag" class="user-tag"></span></div>
				<div id="view_ppsn" class="user-ppsn"></div>
			</div>
		</div>
	</div>

	<!-- 商品清單 -->
	<div id="item_grid"></div>
</div>

<script>
	const GITHUB_CONFIG = {
		token: "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",
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	async function fetchAllData() {
		const ppsn = document.getElementById('target_ppsn').value.trim();
		const token = localStorage.getItem('msw_token');
		const uid = localStorage.getItem('msw_uid');

		if (!ppsn) return alert("請輸入 PPSN");
		if (!token || !uid) return alert("認證資料遺失");

		try {
			// 1. 抓取用戶 Profile
			const profileApi = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/user/profile/ppsn/${ppsn}`;
			const profileRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(profileApi)}`, {
				headers: { "mod-accesstoken": token, "mod-user-id": uid }
			});
			const profileJson = await profileRes.json();
			const userData = profileJson.data;

			if (userData) {
				document.getElementById('user_profile').style.display = 'block';
				document.getElementById('view_nickname').innerText = userData.nickname;
				document.getElementById('view_tag').innerText = "#" + (userData.profileTag || "");
				document.getElementById('view_ppsn').innerText = ppsn;
				document.getElementById('view_avatar').src = userData.profileImageUrl;
				document.getElementById('view_full_body').src = userData.avatarImageUrl;
			}

			// 2. 抓取商品清單 (原本的邏輯)
			const listApi = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
			const listRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(listApi)}`, {
				headers: { "mod-accesstoken": token, "mod-user-id": uid }
			});
			const listJson = await listRes.json();
			renderItems(listJson.data?.items || []);

		} catch (err) {
			console.error(err);
			alert("抓取失敗，請確認 API 或 Token 是否過期");
		}
	}

	function renderItems(items) {
		const grid = document.getElementById('item_grid');
		grid.innerHTML = "";
		
		// 只過濾出你要的部位
		const allowed = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
		const filtered = items.filter(i => allowed.includes(i.avatarType));

		filtered.forEach(item => {
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-container"><img src="${item.itemThumbnailUrl}"></div>
				<div class="info-container">
					<div class="price-badge">${item.price || item.salePrice || 0} WC</div>
					<div style="font-size:13px; color:#fff;">${item.itemName}</div>
					<div style="font-size:11px; color:#666;">ID: ${item.itemId}</div>
				</div>
				<button class="btn-sync" onclick="sync('${item.itemId}', '${item.itemName}', '${item.itemThumbnailUrl}', '${item.price || 0}')">🚀 同步到 GitHub</button>
			`;
			grid.appendChild(card);
		});
	}

	async function sync(id, name, img, price) {
		// ... 這裡保留你原本的 GitHub PUT 邏輯 ...
		alert(`準備同步: ${name}`);
	}
</script>
</body>
</html>
