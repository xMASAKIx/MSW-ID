<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - Fix Encoding</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		.config-section { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
		.input-row { display: flex; gap: 10px; margin-bottom: 10px; }
		input { background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 10px; border-radius: 6px; flex: 1; outline: none; }
		button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

		#profile_card { background: #18181b; border: 1px solid #2d2d30; padding: 25px; border-radius: 15px; margin-bottom: 25px; display: none; align-items: center; gap: 25px; }
		.avatar-frame { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; }
		.avatar-img { height: 160px; image-rendering: pixelated; }
		.user-meta h2 { margin: 0; font-size: 26px; color: #fff; }
		.ppsn-text { color: #888; font-family: monospace; margin-top: 5px; }

		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border: 1px solid #2d2d30; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
		.item-card:hover { transform: translateY(-5px); border-color: #5865f2; }
		.preview-box { background: #000; height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
		.preview-box img { max-width: 140px; max-height: 140px; image-rendering: pixelated; }
		.price-tag { position: absolute; top: 12px; left: 12px; background: #43b581; color: white; padding: 3px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
		.item-info { padding: 15px; flex-grow: 1; }
		.sync-footer { background: #2f3136; border: none; color: #fff; padding: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }

		#log { margin-bottom: 15px; font-size: 14px; color: #adadb8; }
	</style>
</head>
<body>

<div class="container">
	<div class="config-section">
		<div id="log">請輸入有效 Token 後點擊執行</div>
		<div class="input-row">
			<input type="text" id="tk_val" placeholder="mod-accesstoken (Bearer ...)">
			<button onclick="saveAndRun()">執行並儲存</button>
		</div>
		<div class="input-row">
			<input type="text" id="target_ppsn" placeholder="目標 PPSN" value="20372100004991307">
		</div>
	</div>

	<div id="profile_card">
		<div class="avatar-frame">
			<img id="ui_face" class="avatar-img" src="">
		</div>
		<div class="user-meta">
			<h2 id="ui_nickname">未命名</h2>
			<div id="ui_id_display" class="ppsn-text"></div>
		</div>
	</div>

	<div id="item_grid"></div>
</div>

<script>
	// 初始載入 Token
	document.getElementById('tk_val').value = localStorage.getItem('msw_token') || "";

	function saveAndRun() {
		const tk = document.getElementById('tk_val').value.trim();
		localStorage.setItem('msw_token', tk); // 儲存 Token
		startProcess();
	}

	async function startProcess() {
		const ppsn = document.getElementById('target_ppsn').value.trim();
		const token = localStorage.getItem('msw_token');
		const log = document.getElementById('log');

		if (!token) return alert("請填寫 Token");
		
		log.innerText = "⏳ 同步中...";
		document.getElementById('item_grid').innerHTML = "";

		try {
			// 1. 抓取 Profile (處理 undefined 問題)
			const pUrl = `https://mverse-api.nexon.com/social/v1/profile/${ppsn}`;
			const pRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(pUrl)}`, {
				headers: { "mod-accesstoken": token }
			});
			const pData = await pRes.json();

			if (pData && pData.data) {
				document.getElementById('profile_card').style.display = 'flex';
				document.getElementById('ui_nickname').innerText = pData.data.nickname || "未知用戶";
				document.getElementById('ui_id_display').innerText = "PPSN: " + ppsn;
				document.getElementById('ui_face').src = pData.data.avatarImageUrl || "";
			} else {
				log.innerText = "❌ 無法讀取用戶資訊 (Token 可能無權限)";
			}

			// 2. 抓取裝備清單 (處理亂碼問題)
			const lUrl = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
			const lRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(lUrl)}`, {
				headers: { "mod-accesstoken": token }
			});
			const lData = await lRes.json();
			const items = (lData.data && lData.data.items) ? lData.data.items : [];

			renderItems(items);
			log.innerText = `✅ 成功同步 ${items.length} 筆裝備`;

		} catch (e) {
			log.innerText = "❌ 發生錯誤: " + e.message;
		}
	}

	function renderItems(items) {
		const grid = document.getElementById('item_grid');
		// 過濾主要裝備類別
		const targets = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];

		items.filter(i => targets.includes(i.avatarType)).forEach(item => {
			const card = document.createElement('div');
			card.className = 'item-card';
			
			// 處理亂碼：如果名稱包含異常字元，嘗試清理
			let cleanName = item.itemName || "未命名商品";
			if (cleanName.includes("鑫") || cleanName.includes("矗")) {
				// 這裡可以加入特定編碼轉換，或是標註為待修正
				cleanName = "⚠️ " + cleanName; 
			}

			card.innerHTML = `
				<div class="preview-box">
					<img src="${item.itemThumbnailUrl}" alt="item">
					<div class="price-tag">${item.price || 0} WC</div>
				</div>
				<div class="item-info">
					<div style="font-weight:bold; font-size:15px; color:#fff;">${cleanName}</div>
					<div style="font-size:11px; color:#555; margin-top:5px; font-family:monospace;">ID: ${item.itemId}</div>
				</div>
				<button class="sync-footer" onclick="alert('同步: ${item.itemId}')">
					🚀 同步至 GitHub
				</button>
			`;
			grid.appendChild(card);
		});
	}
</script>

</body>
</html>
