<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - Stable Version</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 搜尋與設定區 */
		.search-section { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; }
		.input-group { display: flex; gap: 10px; margin-bottom: 10px; }
		input { background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 10px; border-radius: 6px; flex: 1; outline: none; }
		button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

		/* 用戶資訊區塊 */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 25px; margin-bottom: 25px; display: none; }
		.profile-layout { display: flex; align-items: center; gap: 30px; }
		.full-body-wrapper { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; min-width: 150px; text-align: center; }
		.full-body-img { height: 220px; image-rendering: pixelated; }
		.nickname { font-size: 28px; font-weight: bold; color: #fff; }
		.ppsn-tag { color: #666; font-family: monospace; font-size: 14px; margin-top: 5px; }

		/* 商品列表 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; display: flex; flex-direction: column; }
		.img-box { background: #000; height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
		.img-box img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
		.wc-badge { position: absolute; left: 12px; bottom: 12px; background: #43b581; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
		.info-box { padding: 15px; flex-grow: 1; }
		.sync-btn { width: 100%; background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; border-top: 1px solid #2d2d30; font-weight: bold; }

		#status { margin-bottom: 15px; color: #adadb8; text-align: center; min-height: 20px; }
	</style>
</head>
<body>

<div class="container">
	<div class="search-section">
		<div class="input-group">
			<input type="text" id="ppsn_input" placeholder="輸入 PPSN (例如: 20372100007618840)" value="20372100007618840">
			<input type="text" id="token_input" placeholder="貼上 mod-accesstoken">
			<button onclick="executeFetch()">執行查詢</button>
		</div>
		<div id="status">請確保 Token 已填寫</div>
	</div>

	<!-- 用戶顯示區 -->
	<div id="user_profile">
		<div class="profile-layout">
			<div class="full-body-wrapper">
				<img id="ui_full_body" class="full-body-img" src="" alt="Avatar">
			</div>
			<div class="user-details">
				<div id="ui_nickname" class="nickname">載入中...</div>
				<div id="ui_ppsn" class="ppsn-tag"></div>
			</div>
		</div>
	</div>

	<!-- 商品清單 -->
	<div id="item_grid"></div>
</div>

<script>
	// 讀取 Token 緩存
	document.getElementById('token_input').value = localStorage.getItem('msw_token') || "";

	async function executeFetch() {
		const ppsn = document.getElementById('ppsn_input').value.trim();
		const token = document.getElementById('token_input').value.trim();
		const status = document.getElementById('status');

		if (!ppsn || !token) return alert("PPSN 與 Token 皆為必填");
		localStorage.setItem('msw_token', token);

		status.innerText = "⏳ 正在同步資料中...";
		document.getElementById('user_profile').style.display = 'none';
		document.getElementById('item_grid').innerHTML = "";

		try {
			// 1. 同步執行 Profile 與 List 抓取
			await Promise.all([
				fetchProfile(ppsn, token),
				fetchItems(ppsn, token)
			]);
			status.innerText = "✅ 載入成功";
		} catch (err) {
			console.error(err);
			status.innerText = "❌ 載入失敗，請檢查 Token 是否過期";
		}
	}

	async function fetchProfile(ppsn, token) {
		const url = `https://mverse-api.nexon.com/social/v1/profile/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		
		if (json.data) {
			const d = json.data;
			document.getElementById('user_profile').style.display = 'block';
			document.getElementById('ui_nickname').innerText = d.nickname || "未知用戶";
			document.getElementById('ui_ppsn').innerText = "PPSN: " + ppsn;
			document.getElementById('ui_full_body').src = d.avatarImageUrl || "";
		}
	}

	async function fetchItems(ppsn, token) {
		const url = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		
		// 檢查資料層級，避免出現 undefined
		const items = (json && json.data && json.data.items) ? json.data.items : [];
		
		const grid = document.getElementById('item_grid');
		const targetTypes = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
		
		const filtered = items.filter(i => targetTypes.includes(i.avatarType));
		
		if (filtered.length === 0) {
			document.getElementById('status').innerText = "⚠️ 該用戶目前沒有可識別的商品清單";
			return;
		}

		filtered.forEach(item => {
			const price = item.price || item.salePrice || 0;
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-box">
					<img src="${item.itemThumbnailUrl}" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
					<div class="wc-badge">${price} WC</div>
				</div>
				<div class="info-box">
					<div style="font-weight:bold; font-size:14px; margin-bottom:4px;">${item.itemName || '未命名商品'}</div>
					<div style="color:#777; font-size:11px; font-family:monospace;">ID: ${item.itemId}</div>
				</div>
				<button class="sync-btn" onclick="alert('同步: ${item.itemName}')">🚀 同步到 GitHub</button>
			`;
			grid.appendChild(card);
		});
	}
</script>

</body>
</html>
