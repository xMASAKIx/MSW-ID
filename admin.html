<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Panel - Card View</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background: #0f0f12; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 40px; }
		.container { width: 100%; max-width: 900px; }
		.config-card { background: #1a1a1d; padding: 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
		h2 { margin: 0 0 15px 0; font-size: 18px; color: #fff; }
		
		/* 輸入框樣式 */
		.input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
		label { display: block; font-size: 11px; color: #888; font-weight: 600; margin-bottom: 5px; }
		input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #252529; color: #fff; box-sizing: border-box; }
		
		/* 網格佈局 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
		
		/* 圖片中的卡片樣式 */
		.item-card { background: #1a1a1d; border-radius: 12px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
		.img-container { background: #0a0a0c; height: 180px; display: flex; align-items: center; justify-content: center; padding: 10px; }
		.img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
		
		.info-container { padding: 15px; font-size: 13px; }
		.info-row { display: flex; align-items: center; margin-bottom: 8px; color: #b0b0b0; }
		.info-row b { color: #fff; margin-left: auto; font-weight: 500; }
		.price-text { color: #43b581; font-size: 20px; font-weight: bold; margin: 10px 0; }
		.price-unit { font-size: 12px; color: #888; margin-left: 5px; }
		
		.btn-sync { background: #5865f2; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
		.btn-sync:hover { background: #4752c4; }
		
		.btn-fetch { background: #4e5d6e; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
		#status { margin-top: 10px; font-size: 12px; color: #888; }
	</style>
</head>
<body>

<div class="container">
	<div class="config-card">
		<h2>⚙️ API 設定</h2>
		<div class="input-group">
			<div>
				<label>MSW Access Token</label>
				<input type="password" id="msw_token">
			</div>
			<div>
				<label>MSW User ID</label>
				<input type="text" id="msw_uid">
			</div>
		</div>
		<label>裝備列表 PPSN</label>
		<div style="display: flex; gap: 10px;">
			<input type="text" id="target_ppsn" placeholder="例如: 20372100006053110">
			<button class="btn-fetch" onclick="fetchEquipList()">抓取裝備</button>
		</div>
		<div id="status"></div>
	</div>

	<!-- 這裡會動態生成像圖片那樣的一格一格 -->
	<div id="item_grid"></div>
</div>

<script>
	const GITHUB_CONFIG = {
		token: "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",
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	window.onload = () => {
		document.getElementById('msw_token').value = localStorage.getItem('msw_token') || '';
		document.getElementById('msw_uid').value = localStorage.getItem('msw_uid') || '';
	};

	async function fetchEquipList() {
		const token = document.getElementById('msw_token').value.trim();
		const uid = document.getElementById('msw_uid').value.trim();
		const ppsn = document.getElementById('target_ppsn').value.trim();
		const grid = document.getElementById('item_grid');
		const status = document.getElementById('status');

		if (!token || !ppsn) return alert("請輸入 Token 與 PPSN");

		localStorage.setItem('msw_token', token);
		localStorage.setItem('msw_uid', uid);

		status.innerHTML = "⏳ 正在獲取裝備清單...";
		grid.innerHTML = "";

		const api = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
		const url = `https://corsproxy.io/?${api}`;

		try {
			const res = await fetch(url, { headers: { "mod-accesstoken": token, "mod-user-id": uid } });
			const json = await res.json();
			const items = json.data?.items || [];

			if (items.length === 0) {
				status.innerHTML = "❌ 找不到任何裝備";
				return;
			}

			items.forEach(item => {
				const card = document.createElement('div');
				card.className = 'item-card';
				card.innerHTML = `
					<div class="img-container">
						<img src="${item.itemThumbnailUrl}" alt="icon">
					</div>
					<div class="info-container">
						<div class="info-row">📝 商品名稱 <b>${item.itemName}</b></div>
						<div class="price-text">10 <span class="price-unit">wc</span></div>
						<div class="info-row">🆔 商品 ID <b>${item.itemId}</b></div>
						<div class="info-row">📦 部位 <b>${item.avatarType || 'UNKNOWN'}</b></div>
						<button class="btn-sync" onclick="syncItem('${item.itemId}', '${item.itemName}', '${item.itemThumbnailUrl}')">🚀 同步至 GitHub</button>
					</div>
				`;
				grid.appendChild(card);
			});

			status.innerHTML = `✅ 成功載入 ${items.length} 個項目`;

		} catch (err) {
			status.innerHTML = `<span style="color:#ff4d4d">❌ 錯誤: ${err.message}</span>`;
		}
	}

	async function syncItem(id, name, img) {
		const payload = {
			keyword: name.replace(/\n|\r/g, "").trim(),
			wc: "10wc",
			id: id,
			img: img
		};

		console.log("正在同步:", payload);
		
		try {
			const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
			const getRes = await fetch(url, { headers: { "Authorization": `token ${GITHUB_CONFIG.token}` } });

			let sha = "";
			let list = [];

			if (getRes.ok) {
				const file = await getRes.json();
				sha = file.sha;
				list = JSON.parse(decodeURIComponent(escape(atob(file.content))));
			}

			const idx = list.findIndex(i => i.id === payload.id);
			if (idx > -1) list[idx] = payload; else list.push(payload);

			const content = btoa(unescape(encodeURIComponent(JSON.stringify(list, null, "\t"))));
			
			const putRes = await fetch(url, {
				method: "PUT",
				headers: { "Authorization": `token ${GITHUB_CONFIG.token}`, "Content-Type": "application/json" },
				body: JSON.stringify({ message: `📦 Sync: ${payload.keyword}`, content: content, sha: sha })
			});

			if (putRes.ok) alert(`🎉 ${payload.keyword} 同步成功！`);
			else alert("❌ GitHub 更新失敗");
		} catch (err) {
			alert(`❌ 錯誤: ${err.message}`);
		}
	}
</script>

</body>
</html>
