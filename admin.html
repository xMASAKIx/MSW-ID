<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - Equip API Version</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 搜尋區 */
		.search-section { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; }
		.input-group { display: flex; gap: 10px; margin-bottom: 10px; }
		input { background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 10px; border-radius: 6px; flex: 1; outline: none; }
		button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

		/* 用戶資訊 */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 25px; margin-bottom: 25px; display: none; }
		.profile-layout { display: flex; align-items: center; gap: 30px; }
		.full-body-wrapper { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; }
		.full-body-img { height: 220px; image-rendering: pixelated; }
		.nickname { font-size: 28px; font-weight: bold; }

		/* 裝備列表 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; }
		.img-box { background: #000; height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
		.img-box img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
		.info-box { padding: 15px; }
		.sync-btn { width: 100%; background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; border-top: 1px solid #2d2d30; }

		#status { margin-bottom: 15px; color: #adadb8; }
	</style>
</head>
<body>

<div class="container">
	<div class="search-section">
		<div class="input-group">
			<input type="text" id="ppsn_input" placeholder="輸入 PPSN" value="20372100004991307">
			<button onclick="fetchEquipData()">抓取裝備資訊</button>
		</div>
		<div id="status">準備就緒</div>
	</div>

	<div id="user_profile">
		<div class="profile-layout">
			<div class="full-body-wrapper">
				<img id="ui_full_body" class="full-body-img" src="">
			</div>
			<div class="user-details">
				<div id="ui_nickname" class="nickname">載入中...</div>
				<div id="ui_ppsn" style="color:#666; font-family:monospace;"></div>
			</div>
		</div>
	</div>

	<div id="item_grid"></div>
</div>

<script>
	async function fetchEquipData() {
		const ppsn = document.getElementById('ppsn_input').value.trim();
		const status = document.getElementById('status');
		if (!ppsn) return alert("請輸入 PPSN");

		status.innerText = "⏳ 正在抓取聚合裝備資訊...";
		document.getElementById('item_grid').innerHTML = "";

		try {
			// 1. 先抓取基本 Profile 確保有頭像與暱稱
			const profileUrl = `https://mverse-api.nexon.com/social/v1/profile/${ppsn}`;
			const pRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(profileUrl)}`);
			const pJson = await pRes.json();
			
			if (pJson.data) {
				document.getElementById('user_profile').style.display = 'block';
				document.getElementById('ui_nickname').innerText = pJson.data.nickname;
				document.getElementById('ui_ppsn').innerText = "PPSN: " + ppsn;
				document.getElementById('ui_full_body').src = pJson.data.avatarImageUrl;
			}

			// 2. 抓取新發現的裝備聚合 API
			// 注意：sp 與 gt 參數若無特定需求，可維持範例值或視情況調整
			const equipUrl = `https://msw-avatar-extractor.vercel.app/api/avatars/equip?ppsn=${ppsn}&sp=20372100006776512&gt=c3c2863f72d8457e91dd8a4e34a07ec3`;
			const eRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(equipUrl)}`);
			const eJson = await eRes.json();

			if (eJson && eJson.length > 0) {
				renderEquips(eJson);
				status.innerText = "✅ 裝備資料載入完成";
			} else {
				status.innerText = "⚠️ 該帳號目前可能未穿戴任何可識別裝備";
			}
		} catch (err) {
			console.error(err);
			status.innerText = "❌ 抓取失敗，請檢查網路連線";
		}
	}

	function renderEquips(items) {
		const grid = document.getElementById('item_grid');
		items.forEach(item => {
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-box">
					<img src="${item.imageUrl}">
				</div>
				<div class="info-box">
					<div style="font-weight:bold; font-size:14px; margin-bottom:4px;">${item.name || '未知裝備'}</div>
					<div style="color:#777; font-size:12px; font-family:monospace;">ID: ${item.id}</div>
				</div>
				<button class="sync-btn" onclick="alert('同步: ${item.name}')">🚀 同步到 GitHub</button>
			`;
			grid.appendChild(card);
		});
	}
</script>

</body>
</html>
