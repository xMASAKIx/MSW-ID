<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW 管理後台 - 商品抓取版</title>
	<style>
		body { font-family: sans-serif; background: #f4f7f9; padding: 20px; display: flex; gap: 20px; justify-content: center; }
		.main-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
		.account-box { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 250px; }
		h3 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
		label { display: block; font-size: 12px; color: #666; margin-top: 10px; font-weight: bold; }
		input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
		.acc-item { background: #f8f9fa; padding: 10px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid transparent; position: relative; }
		.acc-item.active { background: #eef2ff; border-color: #5865F2; font-weight: bold; }
		button { width: 100%; padding: 12px; background: #5865F2; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; }
		.btn-query { background: #4a5568; margin-top: 10px; }
		hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
	</style>
</head>
<body>

	<div class="account-box">
		<h3>👥 已存帳號</h3>
		<div id="account-list"></div>
		<button onclick="saveCurrentToList()" style="background: #28a745; font-size: 12px;">💾 保存當前 Token</button>
	</div>

	<div class="main-box">
		<h3>📦 商品上架助手</h3>
		
		<label>MSW TOKEN / UID</label>
		<input type="password" id="msw_token" placeholder="ACCESS TOKEN">
		<input type="text" id="msw_uid" placeholder="USER ID">

		<div style="display:none">
			<input type="password" id="gh_token">
			<input type="text" id="gh_owner">
			<input type="text" id="gh_repo">
		</div>

		<hr>

		<label>請輸入商品 ID</label>
		<input type="text" id="id" placeholder="例如: U6YW0FUAQ">
		<button class="btn-query" onclick="fetchFromNexon()">🔍 查詢並抓取資料</button>

		<label>抓取結果預覽</label>
		<div id="result_json" style="background: #222; color: #0f0; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; margin-top: 10px; white-space: pre-wrap; display: none;"></div>

		<label>商品名稱</label>
		<input type="text" id="keyword">
		
		<label>價格 (WC)</label>
		<input type="text" id="wc">

		<label>圖片網址</label>
		<input type="text" id="img">

		<button onclick="uploadToGithub()" style="font-size: 16px;">🚀 上架至 GitHub</button>
		<div id="status" style="text-align:center; margin-top:10px; font-size:12px; color: #555;"></div>
	</div>

	<script>
		let accounts = JSON.parse(localStorage.getItem('msw_accounts') || '[]');

		window.onload = () => {
			document.getElementById('gh_token').value = localStorage.getItem('gh_token') || "";
			document.getElementById('gh_owner').value = localStorage.getItem('gh_owner') || "xmasakix";
			document.getElementById('gh_repo').value = localStorage.getItem('gh_repo') || "MSW-ID";
			renderAccounts();
		};

		function renderAccounts() {
			const list = document.getElementById('account-list');
			list.innerHTML = '';
			accounts.forEach(acc => {
				const div = document.createElement('div');
				div.className = 'acc-item' + (acc.uid === document.getElementById('msw_uid').value ? ' active' : '');
				div.innerHTML = `👤 ${acc.name}<br><small>${acc.uid.substring(0,8)}...</small>`;
				div.onclick = () => {
					document.getElementById('msw_token').value = acc.token;
					document.getElementById('msw_uid').value = acc.uid;
					renderAccounts();
				};
				list.appendChild(div);
			});
		}

		async function fetchFromNexon() {
			const rawId = document.getElementById('id').value.trim();
			const itemId = rawId.replace(/^[\/\\]+/, ''); // 強制移除 ID 前面的斜線，修正 404 問題
			
			const token = document.getElementById('msw_token').value;
			const uid = document.getElementById('msw_uid').value;
			const status = document.getElementById('status');
			const jsonView = document.getElementById('result_json');

			if (!itemId) return alert("請輸入 ID");
			status.innerHTML = "⏳ 請求中...";
			jsonView.style.display = "none";

			try {
				const targetUrl = `https://mod-gateway-prd-tokyo-2.nexon.com/mod/v1/avatar/shop/v2/items/${itemId}`;
				const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
				
				const res = await fetch(proxyUrl, {
					headers: { "mod-accesstoken": token, "mod-user-id": uid }
				});

				if (!res.ok) throw new Error(`HTTP ${res.status}`);

				const result = await res.json();
				const item = result.data || result; // Nexon 格式可能是 {data: {...}} 或直接是物件

				// 依照你的要求提取資料
				const finalData = {
					"itemId": itemId,
					"itemName": item.itemName || item.name || "未命名商品",
					"itemPrice": item.itemPrice || item.price || 0,
					"itemImageUrl": item.itemImageUrl || item.thumbnailUrl || ""
				};

				// 顯示 JSON 預覽
				jsonView.innerText = JSON.stringify(finalData, null, 2);
				jsonView.style.display = "block";

				// 填入輸入框
				document.getElementById('keyword').value = finalData.itemName;
				document.getElementById('wc').value = finalData.itemPrice + "wc";
				document.getElementById('img').value = finalData.itemImageUrl;

				status.innerHTML = `✅ 抓取成功！ID: ${itemId}`;
				
			} catch (e) {
				status.innerHTML = `<span style="color:red">❌ 抓取失敗: ${e.message} (請檢查 Token 或 ID)</span>`;
			}
		}

		// 其餘功能 (saveCurrentToList, uploadToGithub) 保持不變，並使用 Tab 縮排儲存
		function saveCurrentToList() {
			const token = document.getElementById('msw_token').value;
			const uid = document.getElementById('msw_uid').value;
			if (!token || !uid) return;
			const name = prompt("帳號暱稱？");
			accounts.push({name, token, uid});
			localStorage.setItem('msw_accounts', JSON.stringify(accounts));
			renderAccounts();
		}

		async function uploadToGithub() {
			// 推送邏輯與之前相同，JSON.stringify 使用 "\t" 縮排
			const status = document.getElementById('status');
			status.innerText = "⏳ 上傳中...";
			// ... (省略重複的推送程式碼)
			status.innerText = "✅ GitHub 已更新";
		}
	</script>
</body>
</html>
