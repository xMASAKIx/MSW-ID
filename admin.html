<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper</title>
	<style>
		/* 基本樣式設定 */
		body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 搜尋列樣式 (仿照 image_95687b.png) */
		.search-container { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; display: flex; gap: 15px; }
		#ppsn_input { flex: 1; background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 16px; outline: none; }
		#ppsn_input:focus { border-color: #5865f2; }
		#fetch_btn { background: #5865f2; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
		#fetch_btn:hover { background: #4752c4; }

		/* 用戶資訊區塊樣式 (仿照 image_956f24.png) */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 30px; margin-bottom: 25px; display: none; }
		.profile-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; position: relative; }
		.full-body-img { height: 220px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(0,0,0,0.6)); }
		
		.profile-footer { display: flex; align-items: center; gap: 15px; border-top: 1px solid #2d2d30; padding-top: 20px; width: 100%; }
		.avatar-circle { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #3f3f44; overflow: hidden; background: #000; flex-shrink: 0; }
		.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
		.text-info { display: flex; flex-direction: column; }
		.name-tag-row { display: flex; align-items: baseline; gap: 8px; }
		.nickname { font-size: 22px; font-weight: bold; color: #fff; }
		.tag { color: #adadb8; font-size: 18px; }
		.ppsn-display { color: #666; font-size: 14px; margin-top: 4px; font-family: monospace; }

		/* 商品列表樣式 (仿照 image_950da3.png) */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; display: flex; flex-direction: column; }
		.img-wrapper { background: #000; height: 180px; display: flex; align-items: center; justify-content: center; position: relative; padding: 10px; }
		.img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
		.price-badge { position: absolute; left: 15px; bottom: 15px; background: #43b581; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 16px; }
		
		.item-info { padding: 15px; flex-grow: 1; }
		.item-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; color: #efeff1; }
		.item-id { color: #72767d; font-size: 12px; font-family: monospace; }
		
		.github-btn { background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-top: 1px solid #2d2d30; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
		.github-btn:hover { background: #4e5d6e; }

		#status_text { text-align: center; color: #adadb8; margin-bottom: 15px; font-size: 14px; }
	</style>
</head>
<body>

<div class="container">
	<!-- 1. 搜尋列 -->
	<div class="search-container">
		<input type="text" id="ppsn_input" placeholder="請輸入 PPSN" value="20372100007618840">
		<button id="fetch_btn" onclick="executeFetch()">抓取資料</button>
	</div>

	<div id="status_text">等待輸入中...</div>

	<!-- 2. 用戶資訊 (預設隱藏) -->
	<div id="user_profile">
		<div class="profile-header">
			<img id="ui_full_body" class="full-body-img" src="">
		</div>
		<div class="profile-footer">
			<div class="avatar-circle">
				<img id="ui_avatar" src="">
			</div>
			<div class="text-info">
				<div class="name-tag-row">
					<span id="ui_nickname" class="nickname">載入中...</span>
					<span id="ui_tag" class="tag"></span>
				</div>
				<div id="ui_ppsn" class="ppsn-display"></div>
			</div>
		</div>
	</div>

	<!-- 3. 商品列表 -->
	<div id="item_grid"></div>
</div>

<script>
	// 設定檔
	const GITHUB_SETTING = {
		token: "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", //
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	async function executeFetch() {
		const ppsn = document.getElementById('ppsn_input').value.trim();
		const status = document.getElementById('status_text');
		const mswToken = localStorage.getItem('msw_token'); // 從 LocalStorage 讀取
		const mswUid = localStorage.getItem('msw_uid');

		if (!ppsn) return alert("請輸入 PPSN");
		if (!mswToken) return alert("LocalStorage 中找不到 msw_token");

		status.innerText = "⏳ 正在抓取用戶檔案與清單...";
		document.getElementById('user_profile').style.display = 'none';
		document.getElementById('item_grid').innerHTML = "";

		try {
			// A. 抓取用戶資訊 (Profile API)
			const profileUrl = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/user/profile/ppsn/${ppsn}`;
			const profileRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(profileUrl)}`, {
				headers: { "mod-accesstoken": mswToken, "mod-user-id": mswUid }
			});
			const profileJson = await profileRes.json();

			if (profileJson.data) {
				const d = profileJson.data;
				document.getElementById('user_profile').style.display = 'block';
				document.getElementById('ui_nickname').innerText = d.nickname;
				document.getElementById('ui_tag').innerText = d.profileTag ? "#" + d.profileTag : "";
				document.getElementById('ui_ppsn').innerText = ppsn;
				document.getElementById('ui_avatar').src = d.profileImageUrl;
				document.getElementById('ui_full_body').src = d.avatarImageUrl;
			}

			// B. 抓取商品清單 (List API)
			const listUrl = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
			const listRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(listUrl)}`, {
				headers: { "mod-accesstoken": mswToken, "mod-user-id": mswUid }
			});
			const listJson = await listRes.json();
			
			if (listJson.data && listJson.data.items) {
				renderItems(listJson.data.items);
				status.innerText = "✅ 載入完成";
			} else {
				status.innerText = "⚠️ 找不到商品清單";
			}

		} catch (err) {
			console.error(err);
			status.innerText = "❌ 抓取失敗，請檢查主控台錯誤訊息";
		}
	}

	function renderItems(items) {
		const grid = document.getElementById('item_grid');
		// 過濾出特定部位
		const targetTypes = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
		const filtered = items.filter(i => targetTypes.includes(i.avatarType));

		filtered.forEach(item => {
			const price = item.price || item.salePrice || 0;
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-wrapper">
					<img src="${item.itemThumbnailUrl}">
					<div class="price-badge">${price} WC</div>
				</div>
				<div class="item-info">
					<div class="item-title">${item.itemName}</div>
					<div class="item-id">ID: ${item.itemId}</div>
				</div>
				<button class="github-btn" onclick="syncToGit('${item.itemId}', '${item.itemName}', '${item.itemThumbnailUrl}', '${price}')">
					🚀 同步到 GitHub
				</button>
			`;
			grid.appendChild(card);
		});
	}

	async function syncToGit(id, name, img, price) {
		const payload = {
			keyword: name.trim(),
			wc: price + "wc",
			id: id,
			img: img,
			ts: Date.now()
		};

		try {
			const url = `https://api.github.com/repos/${GITHUB_SETTING.owner}/${GITHUB_SETTING.repo}/contents/${GITHUB_SETTING.path}`;
			const headers = { "Authorization": `token ${GITHUB_SETTING.token}`, "Content-Type": "application/json" };
			
			// 1. 取得現有的內容與 SHA
			const getRes = await fetch(url, { headers });
			let sha = "", list = [];
			
			if (getRes.ok) {
				const fileData = await getRes.json();
				sha = fileData.sha;
				list = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
			}

			// 2. 更新或新增資料
			const existIdx = list.findIndex(i => i.id === id);
			if (existIdx > -1) list[existIdx] = payload; else list.push(payload);

			// 3. 回傳給 GitHub (保持 Tab 縮排)
			const updatedBody = {
				message: `Update item: ${name}`,
				content: btoa(unescape(encodeURIComponent(JSON.stringify(list, null, "\t")))),
				sha: sha
			};

			const putRes = await fetch(url, { method: "PUT", headers, body: JSON.stringify(updatedBody) });
			if (putRes.ok) alert("✅ 已成功同步到 GitHub！");
			else alert("❌ GitHub 更新失敗");

		} catch (e) {
			console.error(e);
			alert("❌ 發生錯誤，請查看 Console");
		}
	}
</script>

</body>
</html>
