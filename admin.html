<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - ProfileCode Version</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 搜尋與設定區 */
		.search-section { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; }
		.input-group { display: flex; gap: 10px; margin-bottom: 10px; }
		input { background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 10px; border-radius: 6px; flex: 1; }
		button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
		button:hover { background: #4752c4; }

		/* 用戶資訊卡片 */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 25px; margin-bottom: 25px; display: none; }
		.profile-layout { display: flex; align-items: center; gap: 30px; }
		.full-body-wrapper { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
		.full-body-img { height: 200px; image-rendering: pixelated; }
		.user-details { flex-grow: 1; }
		.nickname-row { font-size: 28px; font-weight: bold; display: flex; align-items: baseline; gap: 10px; }
		.profile-code { color: #5865f2; font-family: monospace; font-size: 18px; }
		.ppsn-text { color: #666; font-size: 14px; margin-top: 5px; }
		.avatar-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #3f3f44; margin-top: 15px; overflow: hidden; }
		.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

		/* 商品列表 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; }
		.img-box { background: #000; height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
		.img-box img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
		.wc-badge { position: absolute; left: 12px; bottom: 12px; background: #43b581; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
		.info-box { padding: 15px; }
		.sync-btn { width: 100%; background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; border-top: 1px solid #2d2d30; }

		#status { margin-bottom: 15px; font-size: 14px; color: #adadb8; }
	</style>
</head>
<body>

<div class="container">
	<div class="search-section">
		<div class="input-group">
			<input type="text" id="code_input" placeholder="輸入 5 碼 ID (例如: LfobD)" value="LfobD">
			<input type="text" id="token_input" placeholder="貼上 mod-accesstoken">
			<button onclick="saveAndFetch()">執行查詢</button>
		</div>
		<div id="status">請輸入 ID 與 Token 並點擊查詢</div>
	</div>

	<!-- 用戶檔案區 -->
	<div id="user_profile">
		<div class="profile-layout">
			<div class="full-body-wrapper">
				<img id="ui_full_body" class="full-body-img" src="">
			</div>
			<div class="user-details">
				<div class="nickname-row">
					<span id="ui_nickname">載入中...</span>
					<span id="ui_code" class="profile-code"></span>
				</div>
				<div id="ui_ppsn" class="ppsn-text"></div>
				<div class="avatar-circle">
					<img id="ui_avatar" src="">
				</div>
			</div>
		</div>
	</div>

	<!-- 商品列表區 -->
	<div id="item_grid"></div>
</div>

<script>
	// 從緩存讀取 Token
	document.getElementById('token_input').value = localStorage.getItem('msw_token') || "";

	async function saveAndFetch() {
		const code = document.getElementById('code_input').value.trim();
		const token = document.getElementById('token_input').value.trim();
		const status = document.getElementById('status');

		if (!code || !token) return alert("ID 與 Token 皆為必填");
		localStorage.setItem('msw_token', token);

		status.innerText = "⏳ 正在分析 5 碼 ID...";
		document.getElementById('user_profile').style.display = 'none';
		document.getElementById('item_grid').innerHTML = "";

		try {
			// 1. 使用 Vercel API 抓取用戶基本資訊 (取得 PPSN)
			const basicUrl = `https://msw-avatar-extractor.vercel.app/api/profile/basic?code=${code}`;
			const basicRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(basicUrl)}`);
			const basicJson = await basicRes.json();

			if (!basicJson.ppsn) throw new Error("找不到該 ID 對應的 PPSN");
			const ppsn = basicJson.ppsn;

			// 2. 更新 UI 上的用戶資訊
			document.getElementById('user_profile').style.display = 'block';
			document.getElementById('ui_nickname').innerText = basicJson.nickname;
			document.getElementById('ui_code').innerText = `@${code}`;
			document.getElementById('ui_ppsn').innerText = `PPSN: ${ppsn}`;
			document.getElementById('ui_avatar').src = basicJson.profileImageUrl;
			document.getElementById('ui_full_body').src = basicJson.avatarImageUrl;

			// 3. 抓取商品清單 (此步驟仍需要 Token)
			status.innerText = "⏳ 正在抓取商品清單...";
			await fetchItems(ppsn, token);
			
			status.innerText = "✅ 載入完成";
		} catch (err) {
			console.error(err);
			status.innerText = "❌ 錯誤: " + err.message;
		}
	}

	async function fetchItems(ppsn, token) {
		const url = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
		const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
			headers: { "mod-accesstoken": token }
		});
		const json = await res.json();
		const items = json.data?.items || [];
		
		const grid = document.getElementById('item_grid');
		const targetTypes = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
		
		items.filter(i => targetTypes.includes(i.avatarType)).forEach(item => {
			const price = item.price || item.salePrice || 0;
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<div class="img-box">
					<img src="${item.itemThumbnailUrl}">
					<div class="wc-badge">${price} WC</div>
				</div>
				<div class="info-box">
					<div style="font-weight:bold; font-size:14px; margin-bottom:4px;">${item.itemName}</div>
					<div style="color:#777; font-size:12px; font-family:monospace;">ID: ${item.itemId}</div>
				</div>
				<button class="sync-btn" onclick="alert('同步: ${item.itemName}')">🚀 同步到 GitHub</button>
			`;
			grid.appendChild(card);
		});
	}
</script>

</body>
</html>
