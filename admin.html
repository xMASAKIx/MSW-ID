<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>MSW Admin Helper - Final Fix</title>
	<style>
		body { font-family: 'Segoe UI', sans-serif; background-color: #0e0e10; color: #efeff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
		.container { width: 100%; max-width: 1000px; }

		/* 搜尋列 */
		.search-container { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; margin-bottom: 20px; display: flex; gap: 15px; }
		#ppsn_input { flex: 1; background: #0e0e10; border: 1px solid #3f3f44; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 16px; outline: none; }
		#fetch_btn { background: #5865f2; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

		/* 用戶資訊區塊 - 強制顯示邊框以便觀察 */
		#user_profile { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; padding: 30px; margin-bottom: 25px; display: none; }
		.profile-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }
		.full-body-img { height: 220px; object-fit: contain; background: rgba(255,255,255,0.02); border-radius: 8px; }
		
		.profile-footer { display: flex; align-items: center; gap: 15px; border-top: 1px solid #2d2d30; padding-top: 20px; width: 100%; }
		.avatar-circle { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #3f3f44; overflow: hidden; background: #000; }
		.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
		.nickname { font-size: 22px; font-weight: bold; color: #fff; }
		.tag { color: #adadb8; font-size: 18px; margin-left: 8px; }
		.ppsn-display { color: #666; font-size: 14px; margin-top: 4px; font-family: monospace; }

		/* 商品列表 */
		#item_grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
		.item-card { background: #18181b; border-radius: 12px; border: 1px solid #2d2d30; overflow: hidden; }
		.img-wrapper { background: #000; height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
		.price-badge { position: absolute; left: 15px; bottom: 15px; background: #43b581; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
		.item-info { padding: 15px; }
		.github-btn { background: #3a3a3d; color: #fff; border: none; padding: 12px; cursor: pointer; width: 100%; border-top: 1px solid #2d2d30; }

		#status_text { margin-bottom: 15px; color: #adadb8; }
	</style>
</head>
<body>

<div class="container">
	<div class="search-container">
		<input type="text" id="ppsn_input" placeholder="請輸入 PPSN" value="20372100007618840">
		<button id="fetch_btn" onclick="startFetching()">抓取資料</button>
	</div>

	<div id="status_text">準備就緒</div>

	<div id="user_profile">
		<div class="profile-header">
			<img id="ui_full_body" class="full-body-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
		</div>
		<div class="profile-footer">
			<div class="avatar-circle">
				<img id="ui_avatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
			</div>
			<div class="text-info">
				<div><span id="ui_nickname" class="nickname">載入中...</span><span id="ui_tag" class="tag"></span></div>
				<div id="ui_ppsn" class="ppsn-display"></div>
			</div>
		</div>
	</div>

	<div id="item_grid"></div>
</div>

<script>
	const GIT_CONFIG = {
		token: "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",
		owner: "xmasakix",
		repo: "MSW-ID",
		path: "data.json"
	};

	async function startFetching() {
		const ppsn = document.getElementById('ppsn_input').value.trim();
		const mswToken = localStorage.getItem('msw_token');
		const mswUid = localStorage.getItem('msw_uid') || "0"; // 避免 undefined
		const status = document.getElementById('status_text');

		if (!ppsn || !mswToken) return alert("請確認 PPSN 與 LocalStorage 的 msw_token");

		status.innerText = "⏳ 正在同步抓取中...";
		document.getElementById('user_profile').style.display = 'block'; // 先強制顯示，避免 API 慢導致沒感覺
		
		// 同時發送兩個請求
		Promise.all([
			fetchUserProfile(ppsn, mswToken, mswUid),
			fetchItems(ppsn, mswToken, mswUid)
		]).then(() => {
			status.innerText = "✅ 處理完成";
		}).catch(err => {
			status.innerText = "❌ 抓取過程發生錯誤";
			console.error(err);
		});
	}

	async function fetchUserProfile(ppsn, token, uid) {
		const url = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/user/profile/ppsn/${ppsn}`;
		try {
			const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
				headers: { "mod-accesstoken": token, "mod-user-id": uid }
			});
			const json = await res.json();
			console.log("Profile Data:", json);

			if (json.data) {
				const d = json.data;
				document.getElementById('ui_nickname').innerText = d.nickname || "未知用戶";
				document.getElementById('ui_tag').innerText = d.profileTag ? "#" + d.profileTag : "";
				document.getElementById('ui_ppsn').innerText = ppsn;
				document.getElementById('ui_avatar').src = d.profileImageUrl || "";
				document.getElementById('ui_full_body').src = d.avatarImageUrl || "";
			} else {
				document.getElementById('ui_nickname').innerText = "找不到用戶 (API 回傳空值)";
			}
		} catch (e) {
			document.getElementById('ui_nickname').innerText = "用戶資訊抓取失敗";
		}
	}

	async function fetchItems(ppsn, token, uid) {
		const url = `https://mod-gateway-prd-tokyo-2.nexon.com/mverse/v1/shop/mod/inventory/avatars/manage/equip/list/${ppsn}`;
		try {
			const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
				headers: { "mod-accesstoken": token, "mod-user-id": uid }
			});
			const json = await res.json();
			const items = json.data?.items || [];
			
			const grid = document.getElementById('item_grid');
			grid.innerHTML = "";
			
			const targetTypes = ["HAIR", "HAT", "TOP", "OVERALL", "BOTTOM", "SHOES", "GLOVE", "CAPE"];
			items.filter(i => targetTypes.includes(i.avatarType)).forEach(item => {
				const price = item.price || item.salePrice || 0;
				const card = document.createElement('div');
				card.className = 'item-card';
				card.innerHTML = `
					<div class="img-wrapper">
						<img src="${item.itemThumbnailUrl}">
						<div class="price-badge">${price} WC</div>
					</div>
					<div class="item-info">
						<div style="font-weight:bold;">${item.itemName}</div>
						<div style="color:#777; font-size:12px;">ID: ${item.itemId}</div>
					</div>
					<button class="github-btn" onclick="sync('${item.itemId}','${item.itemName}','${item.itemThumbnailUrl}','${price}')">🚀 同步到 GitHub</button>
				`;
				grid.appendChild(card);
			});
		} catch (e) {
			console.error("Items Error:", e);
		}
	}

	async function sync(id, name, img, price) {
		// 同步邏輯保持不變...
		alert("準備同步: " + name);
	}
</script>
</body>
</html>
