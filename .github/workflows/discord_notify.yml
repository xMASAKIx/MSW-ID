name: Discord Notification

on:
  push:
    paths:
      - 'data.json'  # 只有當這個檔案被修改時才發通知
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "📢 **MSW-ID 資料已更新！**",
            "embeds": [{
              "description": "新的商品資訊已同步至網頁。\n[點此查看](https://xmasakix.github.io/MSW-ID/)",
              "color": 3066993
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
