name: Discord Detailed Notification

on:
  push:
    paths:
      - 'data.json'
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract Last Item and Notify
        run: |
          # 1. 使用 jq 抓取 JSON 陣列中的最後一個物件內容
          # 我們提取 keyword, wc, id 三個欄位
          ITEM_NAME=$(jq -r '.[-1].keyword' data.json)
          ITEM_PRICE=$(jq -r '.[-1].wc' data.json)
          ITEM_ID=$(jq -r '.[-1].id' data.json)
          ITEM_IMG=$(jq -r '.[-1].img' data.json)

          # 2. 發送至 Discord，並排版得漂亮一點
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"📦 **MSW-ID 商品庫存更新！**\",
            \"embeds\": [{
              \"title\": \"🆕 已新增商品：$ITEM_NAME\",
              \"thumbnail\": { \"url\": \"$ITEM_IMG\" },
              \"color\": 1752220,
              \"fields\": [
                { \"name\": \"價格\", \"value\": \"$ITEM_PRICE\", \"inline\": true },
                { \"name\": \"商品 ID\", \"value\": \"$ITEM_ID\", \"inline\": true }
              ],
              \"description\": \"[點此開啟網頁查看](https://xmasakix.github.io/MSW-ID/)\",
              \"footer\": { \"text\": \"自動化同步系統\" }
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
