name: Discord Detailed Notification

on:
  push:
    paths:
      - 'data.json'
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2 # 取得最近兩次紀錄以便比對

      - name: Get Diff and Notify
        run: |
          # 提取 data.json 的變動內容（只抓取新增的行並去除符號）
          DIFF_CONTENT=$(git diff HEAD^ HEAD data.json | grep '^\+' | grep -v '^\+\+\+' | sed 's/^\+//' | head -n 15)
          
          # 如果內容太長，截斷它避免 Discord 報錯
          CLEAN_DIFF=$(echo "$DIFF_CONTENT" | tr -d '"' | tr -d ',' | sed 's/^[[:space:]]*//')

          # 發送至 Discord
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"🔔 **商品資料庫有變動！**\",
            \"embeds\": [{
              \"title\": \"偵測到檔案更新\",
              \"description\": \"細節如下：\n\`\`\`json\n$CLEAN_DIFF\n\`\`\`\",
              \"color\": 3447003,
              \"footer\": { \"text\": \"前往網頁：https://xmasakix.github.io/MSW-ID/\" }
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
