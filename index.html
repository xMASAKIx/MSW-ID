<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正版商品ID</title>
    <style>
        :root {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --bg-card: #252525;
            --text-main: #e0e0e0;
            --text-highlight: #39ff14;
            --border-color: #3d3d3d;
            --hover-bg: #333333;
            --accent-glow: rgba(57, 255, 20, 0.4);
        }

        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0; padding: 20px; 
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        h2 { 
            color: var(--text-highlight); 
            text-align: center; 
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 20px;
        }

        /* --- 新增：匯出功能控制面板 --- */
        .export-panel {
            background: var(--bg-container);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .btn-group { display: flex; gap: 10px; }

        button.admin-btn {
            padding: 8px 16px;
            background: #1a1a1a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button.admin-btn:hover {
            border-color: var(--text-highlight);
            color: var(--text-highlight);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        button.admin-btn.primary {
            background: var(--text-highlight);
            color: #000;
            border-color: var(--text-highlight);
        }

        button.admin-btn.primary:hover {
            box-shadow: 0 0 15px var(--accent-glow);
            color: #000;
        }

        .status-info { font-size: 14px; color: #aaa; }
        #selectedCount { color: var(--text-highlight); font-weight: bold; }

        /* --- 分類按鈕區域 --- */
        .filter-group {
            display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;
            margin-bottom: 10px; padding: 10px; background: var(--bg-container);
            border-radius: 15px; border: 1px solid var(--border-color);
        }

        #partFilterGroup { background: #1a1a1a; margin-bottom: 10px; }

        .filter-btn {
            padding: 5px 10px; background: #1a1a1a; color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 20px;
            cursor: pointer; font-weight: bold; transition: all 0.3s;
        }

        .filter-btn:hover { border-color: var(--text-highlight); color: var(--text-highlight); box-shadow: 0 0 8px var(--accent-glow); }
        .filter-btn.active { background: var(--text-highlight); color: #000; border-color: var(--text-highlight); box-shadow: 0 0 15px var(--accent-glow); }

        /* --- 卡片排版 --- */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .item-card {
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color);
            padding: 15px; display: flex; flex-direction: column; position: relative; transition: transform 0.2s;
        }

        .item-card:hover { border-color: var(--text-highlight); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* --- 新增：卡片自訂核取方塊樣式 --- */
        .card-checkbox-label {
            position: absolute;
            top: 14px;
            left: 14px;
            cursor: pointer;
            z-index: 10;
        }

        .card-checkbox-label input { position: absolute; opacity: 0; width: 0; height: 0; }

        .card-checkmark {
            display: block;
            height: 18px;
            width: 18px;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
            transition: all 0.2s;
        }

        .card-checkbox-label:hover input ~ .card-checkmark { border-color: var(--text-highlight); }
        .card-checkbox-label input:checked ~ .card-checkmark {
            background-color: var(--text-highlight);
            border-color: var(--text-highlight);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .card-checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 4px;
            height: 9px;
            border: solid black;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .card-checkbox-label input:checked ~ .card-checkmark:after { display: block; }

        /* 縮排頂部欄位，預留空間給左上角勾選方塊 */
        .card-top { display: flex; justify-content: space-between; margin-bottom: 15px; padding-left: 24px; }
        .info-area { flex: 1; display: flex; flex-direction: column; gap: 8px; font-size: 16px; }
        .info-row { display: flex; align-items: flex-start; }
        .label { white-space: nowrap; color: #aaa; margin-right: 5px; }
        
        .author-link {
            color: var(--text-highlight);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .author-link:hover { opacity: 0.7; }

        .img-area { width: 100px; height: 100px; margin-left: 10px; background: #121212; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .item-img { max-width: 100%; max-height: 100%; border-radius: 4px; cursor: zoom-in; transition: transform 0.3s; }
        .item-img:hover { transform: scale(2.5); z-index: 100; box-shadow: 0 0 15px var(--accent-glow); }

        .id-area { margin-top: auto; }
        .copy-item {
            cursor: pointer; padding: 12px; border-radius: 6px; background-color: #1a1a1a;
            color: var(--text-highlight); font-weight: bold; font-size: 20px; text-align: center;
            border: 1px solid var(--border-color); transition: all 0.2s; word-break: break-all; margin-bottom: 5px;
        }
        .copy-item:hover { background-color: var(--hover-bg); border-color: var(--text-highlight); box-shadow: 0 0 10px var(--accent-glow); }

        #loader { text-align: center; font-size: 18px; padding: 60px; }
        #toast {
            visibility: hidden; min-width: 250px; background-color: #000; color: var(--text-highlight);
            text-align: center; border-radius: 50px; padding: 15px 25px; position: fixed;
            z-index: 200; left: 50%; bottom: 50px; transform: translateX(-50%);
            box-shadow: 0 0 20px var(--accent-glow); border: 1px solid var(--text-highlight); font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 50px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 50px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>正版商品ID(點名稱可看作者其他造型)</h2>
    
    <div id="exportPanel" class="export-panel" style="display: none;">
        <div class="btn-group">
            <button id="selectAllBtn" class="admin-btn" onclick="toggleSelectAll()">全選功能</button>
            <button id="exportBtn" class="admin-btn primary" onclick="exportJSON()">匯出已選取 JSON</button>
        </div>
        <div class="status-info">
            目前已勾選：<span id="selectedCount">0</span> 筆造型資料
        </div>
    </div>

    <div id="partFilterGroup" class="filter-group" style="display: none;"></div>
    <div id="filterGroup" class="filter-group" style="display: none;"></div>
    <div id="loader">同步雲端資料中...</div>
    <div id="gridContainer" class="grid-container" style="display: none;"></div>
</div>

<div id="toast">已複製到剪貼簿</div>

<script>
    const DATA_URL = 'https://raw.githubusercontent.com/xMASAKIx/MSW-ID/refs/heads/main/data.json'; 
    let allRawData = []; 
    let currentFiltered = [];        // 儲存當前畫面上篩選過濾後的項目
    let selectedItemIds = new Set();  // 使用全域 Set 記憶被勾選的原始完整 ID 欄位字串
    let isAllSelected = false;

    const CATEGORY_MAP = {
        "20372100000223997": "別時", "20372100005338018": "小波", "20372100003479787": "HEE", "20372100002734060": "死靈", "20372100005520366": "伊卡路斯",
        "20372100003567962": "妃姬", "20372100008583110": "ES(夜夜)", "20372100005894481": "平行光線", "20372000285890864" : "黑子",
        "20372100003096391": "幽幽子", "20372100001110251": "mimiming天使", "20372100002790823": "mimiming天使",
        "20372100004235799": "死靈", "20372100005999546": "TJ", "20372100005764633": "TJ", "20372100006137517": "PLAT", "20372100007695567" : "PLAT",
        "20372100005118171": "兔仔", "20372000486671177": "韓國愛芮", "20372100005311821": "照", "20372100003186784": "死靈",
        "20372100003863084": "阿卡利", "20372100000180209": "PLAT", "20372100003462165": "奧米加獸", "20372100000209378": "PAKA頭",
        "20372100000208070": "珊璞", "20372100002340154": "金武金", "20372100005770592": "PAKA", "20372100005714983": "AWAWA",
        "20372100005385883": "白狐", "20372100005694709": "別時", "20372100008443475": "PAKA頭", "20372100001142530": "北極熊初音",
        "20372100005802883": "PAKA頭", "20372100008359961": "沖田", "20372100002553986": "殺手兔", "20372100000590354" : "照",
        "20372100006407090": "北極熊初音", "20372100009098159": "哥倫比雅", "20372100007473992": "蕾米&芙蘭", "20372100000155226": "캡틴봉봉",
        "20372100004981518": "AWAWA", "20372100003328034": "Coya奇術", "20372100000224166": "別時",
        "20372001057320745": "MIKA", "20372100004546916": "MIKA", "20372100005833987": "菲特", "20372100001023713": "Majajaja",
        "20372100005779084": "簡&卡媽", "20372100007840052": "惡魔狐", "20372100007791322": "奶鱈","20372100000279508": "波奇",
        "20372100007023711": "三三", "20372100002684295": "杏葉","20372100005046143": "TJ","20372100005568477": "火精靈",
        "20372100007118040": "多路", "20372100003462156": "奧米加獸","20372100008876779": "昔連","20372100004321168": "帕丘莉",
        "20372100004194770": "阿丞","default": "未分類"
    };

    const PART_DISPLAY_MAP = {
        "HAIR": "髮型", "HAT": "帽子", "CAPE": "披風", "TOP": "上衣", "GLOVE": "手套",
        "OVERALL": "大衣", "BOTTOM": "褲裙", "SHOES": "鞋子", "WEAPON": "武器"
    };

    const PART_ORDER = ["HAIR", "HAT", "CAPE", "TOP", "GLOVE", "OVERALL", "BOTTOM", "SHOES", "WEAPON"];

    function createCard(item) {
        const authorName = CATEGORY_MAP[item.author] || CATEGORY_MAP["default"];
        const idLines = item.id.split('\n');
        let idHtml = '';
        idLines.forEach(line => {
            if(line.trim() !== "") {
                const safeLine = line.trim().replace(/'/g, "\\'");
                idHtml += `<div class="copy-item" onclick="copyToClipboard('${safeLine}')">${line.trim()}</div>`;
            }
        });

        // 檢查當前項目先前是否在全域被選取
        const isChecked = selectedItemIds.has(item.id) ? 'checked' : '';

        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <label class="card-checkbox-label">
                <input type="checkbox" class="card-item-checkbox" ${isChecked} onchange="handleCardCheck(this, '${item.id.replace(/'/g, "\\'")}')">
                <span class="card-checkmark"></span>
            </label>
            <div class="card-top">
                <div class="info-area">
                    <div class="info-row">
                        <span class="label">商品名稱：</span>
                        <span class="author-link" onclick="filterByAuthorName('${authorName}')">${item.keyword}</span>
                    </div>
                    <div class="info-row"><span class="label">商品價格：</span><span>${item.wc} WC</span></div>
                    <div class="info-row"><span class="label">商品ID</span></div>
                </div>
                <div class="img-area">
                    <img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/100/252525/39ff14?text=No+Img'">
                </div>
            </div>
            <div class="id-area">${idHtml}</div>
        `;
        return card;
    }

    // 處理勾選狀態變更
    function handleCardCheck(checkbox, rawId) {
        if (checkbox.checked) {
            selectedItemIds.add(rawId);
        } else {
            selectedItemIds.delete(rawId);
        }
        updateCountText();
    }

    // 更新選取數量文字
    function updateCountText() {
        document.getElementById('selectedCount').innerText = selectedItemIds.size;
    }

    // 本頁全選 / 取消全選
    function toggleSelectAll() {
        isAllSelected = !isAllSelected;
        const currentCheckboxes = document.querySelectorAll('.card-item-checkbox');
        
        currentFiltered.forEach((item, idx) => {
            if (isAllSelected) {
                selectedItemIds.add(item.id);
                if(currentCheckboxes[idx]) currentCheckboxes[idx].checked = true;
            } else {
                selectedItemIds.delete(item.id);
                if(currentCheckboxes[idx]) currentCheckboxes[idx].checked = false;
            }
        });

        document.getElementById('selectAllBtn').innerText = isAllSelected ? '取消本頁全選' : '全選功能';
        updateCountText();
    }

    function filterByAuthorName(authorName) {
        const buttons = document.querySelectorAll('#filterGroup .filter-btn');
        let targetBtn = null;
        
        buttons.forEach(btn => {
            if (btn.innerText.startsWith(authorName + " (") || btn.innerText === authorName) {
                targetBtn = btn;
            }
        });

        if (targetBtn) {
            targetBtn.click();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function renderPartFilters(data) {
        const partGroup = document.getElementById('partFilterGroup');
        partGroup.innerHTML = '';
        PART_ORDER.forEach(partKey => {
            const filteredData = data.filter(item => {
                const type = (item.avatarType || item.avatartype || "").toUpperCase();
                if (partKey === "WEAPON") return type === "WEAPON" || item.author === "1";
                return type === partKey;
            });
            if (filteredData.length > 0) {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = `${PART_DISPLAY_MAP[partKey]} (${filteredData.length})`;
                btn.onclick = function() {
                    switchActiveBtn(this);
                    isAllSelected = false;
                    document.getElementById('selectAllBtn').innerText = '全選功能';
                    currentFiltered = filteredData; // 更新目前頁面資料集
                    displayData(filteredData);
                    document.querySelectorAll('#filterGroup .filter-btn').forEach(b => b.classList.remove('active'));
                };
                partGroup.appendChild(btn);
            }
        });
        partGroup.style.display = 'flex';
    }

    function renderFilters(data) {
        const filterGroup = document.getElementById('filterGroup');
        const authorsInData = new Set();
        data.forEach(item => {
            const name = CATEGORY_MAP[item.author] || CATEGORY_MAP["default"];
            if (name !== "武器") authorsInData.add(name);
        });

        filterGroup.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn active';
        allBtn.innerText = `全部 (${data.length})`;
        allBtn.onclick = function() {
            switchActiveBtn(this);
            isAllSelected = false;
            document.getElementById('selectAllBtn').innerText = '全選功能';
            currentFiltered = data; // 更新目前頁面資料集
            displayData(data);
            document.querySelectorAll('#partFilterGroup .filter-btn').forEach(b => b.classList.remove('active'));
        };
        filterGroup.appendChild(allBtn);

        const otherLabel = CATEGORY_MAP["default"] || "未分類";
        let sortedAuthors = Array.from(authorsInData).filter(name => name !== otherLabel).sort();
        if (authorsInData.has(otherLabel)) sortedAuthors.push(otherLabel);

        sortedAuthors.forEach(authorName => {
            const authorData = data.filter(item => (CATEGORY_MAP[item.author] || CATEGORY_MAP["default"]) === authorName);
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.innerText = `${authorName} (${authorData.length})`;
            btn.onclick = function() {
                switchActiveBtn(this);
                isAllSelected = false;
                document.getElementById('selectAllBtn').innerText = '全選功能';
                currentFiltered = authorData; // 更新目前頁面資料集
                displayData(authorData);
                document.querySelectorAll('#partFilterGroup .filter-btn').forEach(b => b.classList.remove('active'));
            };
            filterGroup.appendChild(btn);
        });
        filterGroup.style.display = 'flex';
    }

    function switchActiveBtn(target) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        target.classList.add('active');
    }

    function displayData(data) {
        const container = document.getElementById('gridContainer');
        container.innerHTML = '';
        data.forEach(item => container.appendChild(createCard(item)));
        container.style.display = 'grid';
    }

    // 核心輸出邏輯：篩選全域選取的物件並轉換結構下載為具有 Tab 縮排的 JSON 檔
    function exportJSON() {
        if (selectedItemIds.size === 0) {
            alert('請至少勾選一項造型商品再進行匯出！');
            return;
        }

        const exportedData = [];
        const nowInSeconds = Date.now() / 1000;
        let counter = 0;

        // 照順序掃描原始全體資料，確保導出的順序與原始一致
        allRawData.forEach((originalItem) => {
            if (selectedItemIds.has(originalItem.id)) {
                // 擷取 ID 欄位的第一行作為基準 itemId 避免斷行衝突
                const firstId = originalItem.id ? originalItem.id.split('\n')[0].trim() : '';
                
                // 動態演算微秒級時間戳記與 3 位數隨機碼，組裝出唯一的內部 ID
                const itemTimestamp = (nowInSeconds + (counter * 0.001)).toFixed(3);
                const generatedId = `${itemTimestamp}_${Math.floor(Math.random() * 900 + 100)}`;

                const structuredObj = {
                    "active": true,
                    "createdAt": parseFloat(itemTimestamp),
                    "currentPrice": parseInt(originalItem.wc) || 0,
                    "currentStatus": "pending_sale",
                    "id": generatedId,
                    "itemId": firstId,
                    "itemName": originalItem.keyword,
                    "lastChecked": parseFloat(itemTimestamp),
                    "matchByName": false,
                    "maxPrice": 99999999.0,
                    "rapidMode": false,
                    "targetPrice": -1.0,
                    "thumbnail": originalItem.img || ""
                };

                exportedData.push(structuredObj);
                counter++;
            }
        });

        // 轉換為帶 Tab 字元縮排的精緻特定 JSON 檔
        const jsonString = JSON.stringify(exportedData, null, '\t');
        const blob = new Blob([jsonString], { type: 'application/json;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.setAttribute("href", url);
        link.setAttribute("download", `msw_export_${Math.floor(nowInSeconds)}.json`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        showToast("✔ 特定格式 JSON 檔案已成功匯出下載！");
    }

    async function loadData() {
        try {
            const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
            allRawData = await response.json();
            allRawData.reverse();
            
            currentFiltered = allRawData; // 預設當前可視範圍為全部資料
            
            renderPartFilters(allRawData); 
            renderFilters(allRawData);     
            displayData(allRawData);
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('exportPanel').style.display = 'flex'; // 顯示管理面板
        } catch (error) {
            document.getElementById('loader').innerText = '✘ 資料讀取失敗';
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast("✔ 已複製: " + text);
        }).catch(err => showToast("✘ 複製失敗"));
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
    }
    window.onload = loadData;
</script>
</body>
</html>
