<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品自動同步助手 (深色模式)</title>
    <style>
        /* --- 深色模式 UI 變數設計 --- */
        :root {
            --bg-body: #121212;      /* 極深灰背景 */
            --bg-container: #1e1e1e; /* 稍淺的深灰容器 */
            --bg-header: #2d2d2d;    /* 表格標題背景 */
            --bg-cell: #252525;      /* 表格儲存格背景 */
            
            --text-main: #e0e0e0;    /* 主文字顏色 (淡灰) */
            --text-highlight: #39ff14; /* 螢光綠 (強調色，如標題、提示) */
            
            --border-color: #3d3d3d;  /* 邊框顏色 */
            --hover-bg: #333333;      /* 滑鼠移上去的顏色 */
            --accent-glow: rgba(57, 255, 20, 0.3); /* 螢光綠光暈 */
        }

        /* 基礎樣式 */
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        
        .container { 
            width: 100%; 
            max-width: 1000px; 
            background: var(--bg-container); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color);
        }
        
        /* 標題加上螢光強調和光暈 */
        h2 { 
            color: var(--text-highlight); 
            text-align: center; 
            border-bottom: 2px solid var(--text-highlight); 
            padding-bottom: 15px; 
            text-shadow: 0 0 10px var(--accent-glow);
            margin-top: 0;
        }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; border-radius: 8px; overflow: hidden; }
        
        th { 
            background-color: var(--bg-header); 
            color: var(--text-main); 
            padding: 15px; 
            font-size: 16px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
        }
        
        td { 
            border: 1px solid var(--border-color); 
            padding: 15px; 
            text-align: center; 
            background-color: var(--bg-cell); 
            word-break: break-all; 
            vertical-align: middle; 
            transition: background 0.2s;
        }

        /* 複製格的特殊樣式 - 滑鼠移入有光暈 */
        .copyable { 
            cursor: pointer; 
            font-weight: bold; 
            position: relative; 
            color: var(--text-highlight); /* ID 變為螢光綠 */
        }
        
        .copyable:hover { 
            background-color: var(--hover-bg); 
            box-shadow: inset 0 0 15px var(--accent-glow);
        }
        
        .copyable:active { transform: scale(0.97); }
        
        /* 圖片樣式 - 加上淡淡的光暈顯得更精緻 */
        .item-img { 
            width: 80px; 
            height: auto; 
            border-radius: 8px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        
        .item-img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* 載入中動畫 */
        #loader { text-align: center; font-size: 18px; padding: 60px; color: var(--text-main); }

        /* 彈出提示 (Toast) - 深色底配螢光文字 */
        #toast {
            visibility: hidden; 
            min-width: 250px; 
            background-color: #000; 
            color: var(--text-highlight);
            text-align: center; 
            border-radius: 50px; /* 圓角膠囊形狀 */
            padding: 15px 25px; 
            position: fixed;
            z-index: 100; 
            left: 50%; 
            bottom: 50px; 
            transform: translateX(-50%);
            box-shadow: 0 0 20px var(--accent-glow);
            border: 1px solid var(--text-highlight);
            font-weight: bold;
        }
        
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
