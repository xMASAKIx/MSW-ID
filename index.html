<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正版商品ID(點ID複製)</title>
    <style>
        :root {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --bg-card: #252525;
            --text-main: #e0e0e0;
            --text-highlight: #39ff14;
            --border-color: #3d3d3d;
            --hover-bg: #333333;
            --accent-glow: rgba(57, 255, 20, 0.4);
        }

        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0; 
            padding: 20px; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        h2 { 
            color: var(--text-highlight); 
            text-align: center; 
            border-bottom: 2px solid var(--text-highlight); 
            padding-bottom: 15px; 
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .item-card:hover {
            border-color: var(--text-highlight);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .info-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 16px;
        }

        .info-row { display: flex; align-items: flex-start; }

        .label {
            white-space: nowrap;
            color: #aaa;
            margin-right: 5px;
        }

        .img-area {
            width: 100px;
            height: 100px;
            margin-left: 10px;
            background: #121212;
            border-radius: 8px;
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
            cursor: zoom-in;
            transition: transform 0.3s;
        }

        .item-img:hover {
            transform: scale(2.5);
            z-index: 100;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .id-area { margin-top: auto; }

        .copy-item {
            cursor: pointer;
            padding: 12px;
            border-radius: 6px;
            background-color: #1a1a1a;
            color: var(--text-highlight);
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .copy-item:hover {
            background-color: var(--hover-bg);
            border-color: var(--text-highlight);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .copy-item:active { transform: scale(0.98); }

        #loader { text-align: center; font-size: 18px; padding: 60px; }

        #toast {
            visibility: hidden; 
            min-width: 250px; 
            background-color: #000; 
            color: var(--text-highlight);
            text-align: center; 
            border-radius: 50px;
            padding: 15px 25px; 
            position: fixed;
            z-index: 200;
            left: 50%; 
            bottom: 50px; 
            transform: translateX(-50%);
            box-shadow: 0 0 20px var(--accent-glow);
            border: 1px solid var(--text-highlight);
            font-weight: bold;
        }
        
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 50px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 50px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>正版商品ID(點ID複製)</h2>
    <div id="loader">同步雲端資料中...</div>
    <div id="gridContainer" class="grid-container" style="display: none;"></div>
</div>

<div id="toast">已複製到剪貼簿</div>

<script>
    const DATA_URL = 'https://raw.githubusercontent.com/xMASAKIx/MSW-ID/refs/heads/main/data.json'; 
    
    // 分類對照表
    const CATEGORY_MAP = {
        "20372100000223997": "別時",
        "20372100005338018": "小波",
        "20372100003479787": "卡提",
        "20372100003567962": "妃姬",
        "20372100008583110": "ES(夜夜發貨號)",
        "20372100005894481": "平行",
        "20372100003096391": "幽幽子",
        "20372100001110251": "mimiming天使",
        "20372100002790823": "mimiming天使",
        "20372100004235799": "死靈",
        "20372100005999546": "TJ01",
        "20372100005764633": "TJ02",
        "20372100005118171": "兔仔",
        "20372000486671177": "韓國愛芮",
        "20372100005311821": "照",
        "20372100003863084": "阿卡利",
        "20372100000180209": "PLAT",
        "20372100003462165": "奧米加獸",
        "20372100000208070": "珊璞",
        "20372100002340154": "金武金",
        "20372100005770592": "PAKA",
        "20372100005385883": "白狐",
        "20372100005694709": "小別時",
        "20372100008443475": "paka1",
        "20372100005802883": "paka2",
        "20372100008359961": "沖田",
        "20372100002553986": "殺手兔",
        "20372100006407090": "北極熊初音",
        "20372100009098159": "哥倫比雅",
        "default": "其他作者"
    };

    // 建立卡片
    function createCard(item) {
        const idLines = item.id.split('\n');
        let idHtml = '';
        idLines.forEach(line => {
            if(line.trim() !== "") {
                const safeLine = line.trim().replace(/'/g, "\\'");
                idHtml += `<div class="copy-item" onclick="copyToClipboard('${safeLine}')">${line.trim()}</div>`;
            }
        });

        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="card-top">
                <div class="info-area">
                    <div class="info-row"><span class="label">商品名稱：</span><span>${item.keyword}</span></div>
                    <div class="info-row"><span class="label">商品價格：</span><span>${item.wc} WC</span></div>
                    <div class="info-row"><span class="label">商品ID</span></div>
                </div>
                <div class="img-area">
                    <img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/100/252525/39ff14?text=No+Img'">
                </div>
            </div>
            <div class="id-area">${idHtml}</div>
        `;
        return card;
    }

    async function loadData() {
        try {
            const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
            let data = await response.json();
            data.reverse();

            const container = document.getElementById('gridContainer');
            container.innerHTML = ''; 

            // 核心分類邏輯
            const groups = data.reduce((acc, item) => {
                const code = item.author || "default"; 
                const displayName = CATEGORY_MAP[code] || CATEGORY_MAP["default"];
                if (!acc[displayName]) acc[displayName] = [];
                acc[displayName].push(item);
                return acc;
            }, {});

            // 渲染
            for (const name in groups) {
                const header = document.createElement('div');
                header.style.gridColumn = "1 / -1"; 
                header.style.padding = "20px 10px 10px 10px";
                header.style.borderBottom = "1px solid #3d3d3d";
                header.style.marginBottom = "10px";
                header.innerHTML = `<h3 style="color: #39ff14; margin: 0;">● 作者：${name} <small style="color: #666; font-size: 14px;">(${groups[name].length} 件作品)</small></h3>`;
                container.appendChild(header);

                groups[name].forEach(item => {
                    container.appendChild(createCard(item));
                });
            }

            document.getElementById('loader').style.display = 'none';
            container.style.display = 'grid';
        } catch (error) {
            document.getElementById('loader').innerText = '✘ 資料讀取失敗 (請檢查 JSON)';
            console.error('Error:', error);
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast("✔ 已複製: " + text);
        }).catch(err => {
            showToast("✘ 複製失敗");
        });
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
    }

    window.onload = loadData;
</script>
</body>
</html>
