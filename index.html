<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品自動同步助手 (分行複製版)</title>
    <style>
        :root {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --bg-header: #2d2d2d;
            --bg-cell: #252525;
            --text-main: #e0e0e0;
            --text-highlight: #39ff14;
            --border-color: #3d3d3d;
            --hover-bg: #333333;
            --accent-glow: rgba(57, 255, 20, 0.3);
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: var(--bg-container); padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color); }
        h2 { color: var(--text-highlight); text-align: center; border-bottom: 2px solid var(--text-highlight); padding-bottom: 15px; text-shadow: 0 0 10px var(--accent-glow); margin-top: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; border-radius: 8px; overflow: hidden; }
        th { background-color: var(--bg-header); color: var(--text-main); padding: 15px; font-size: 16px; border-bottom: 2px solid var(--border-color); }
        td { border: 1px solid var(--border-color); padding: 10px; text-align: center; background-color: var(--bg-cell); vertical-align: middle; }

        /* --- 核心修改：分行複製按鈕樣式 --- */
        .id-container {
            display: flex;
            flex-direction: column;
            gap: 5px; /* 行與行之間的間距 */
        }

        .copy-item {
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
            color: var(--text-highlight);
            font-weight: bold;
            border: 1px transparent solid;
        }

        .copy-item:hover {
            background-color: var(--hover-bg);
            border-color: var(--text-highlight);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .copy-item:active { transform: scale(0.95); }

        .item-img { width: 80px; height: auto; border-radius: 8px; border: 1px solid var(--border-color); transition: transform 0.3s; }
        .item-img:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent-glow); }

        #loader { text-align: center; font-size: 18px; padding: 60px; color: var(--text-main); }
        
        #toast {
            visibility: hidden; min-width: 250px; background-color: #000; color: var(--text-highlight);
            text-align: center; border-radius: 50px; padding: 15px 25px; position: fixed;
            z-index: 100; left: 50%; bottom: 50px; transform: translateX(-50%);
            box-shadow: 0 0 20px var(--accent-glow); border: 1px solid var(--text-highlight); font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 50px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 50px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>商品清單 (點擊單行 ID 複製)</h2>
    <div id="loader">同步雲端資料中...</div>
    <table id="mainTable" style="display: none;">
        <thead>
            <tr>
                <th style="width: 25%;">關鍵字</th>
                <th style="width: 15%;">WC</th>
                <th style="width: 40%;">商品ID (自主選擇)</th>
                <th style="width: 20%;">商品圖</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="toast">已複製</div>

<script>
    const DATA_URL = 'https://api.npoint.io/a84e07eda3527ed439af'; 

    async function loadData() {
        try {
            // 加入防快取時間戳記
            const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
            let data = await response.json();
            
            // --- 核心改動：反轉陣列，讓最後一筆變第一筆 ---
            data.reverse(); 

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            data.forEach(item => {
                const row = document.createElement('tr');
                
                // 將 ID 字串依照換行符號 \n 切開
                const idLines = item.id.split('\n');
                
                let idHtml = '<div class="id-container">';
                idLines.forEach(line => {
                    if(line.trim() !== "") {
                        // 這裡使用反引號處理 JavaScript 傳參，並對單引號做簡單轉義
                        const safeLine = line.trim().replace(/'/g, "\\'");
                        idHtml += `<div class="copy-item" onclick="copyToClipboard('${safeLine}')">${line.trim()}</div>`;
                    }
                });
                idHtml += '</div>';

                row.innerHTML = `
                    <td>${item.keyword}</td>
                    <td>${item.wc}</td>
                    <td>${idHtml}</td>
                    <td><img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/80/252525/39ff14?text=No+Img'"></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainTable').style.display = 'table';
        } catch (error) {
            document.getElementById('loader').innerText = '✘ 資料讀取失敗';
            console.error('Fetch error:', error);
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast("✔ 已複製: " + text);
        }).catch(err => {
            showToast("✘ 複製失敗");
        });
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
    }

    window.onload = loadData;
</script>

</body>
</html>
